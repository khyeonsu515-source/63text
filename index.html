<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>intone news</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f7f9;
    --bg-translucent: rgba(247, 247, 249, 0.78);
    --card: #ffffff;
    --text: #14151a;
    --muted: #6b7280;
    --border: #e7e7ec;
    --accent: #6d5ef8;
    --accent-2: #ff6b4a;
    --accent-soft: rgba(109, 94, 248, 0.12);
    --shadow-sm: 0 1px 2px rgba(20, 21, 26, 0.05);
    --track: #eef0f4;
    --sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Pretendard, "Noto Sans KR", sans-serif;
    --ease: cubic-bezier(0.16, 1, 0.3, 1);
    --radius-lg: 20px;
    --focus-ring: 0 0 0 3px var(--accent-soft), 0 0 0 1.5px var(--accent);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0a0a0d;
      --bg-translucent: rgba(10, 10, 13, 0.78);
      --card: #17181f;
      --text: #f2f2f5;
      --muted: #969ab0;
      --border: #24252f;
      --accent: #8f84ff;
      --accent-2: #ff8464;
      --accent-soft: rgba(143, 132, 255, 0.16);
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
      --track: #1e1f28;
    }
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background:
      radial-gradient(640px circle at 6% -12%, var(--accent-soft), transparent 60%),
      radial-gradient(520px circle at 100% 0%, rgba(255, 107, 74, 0.08), transparent 55%),
      var(--bg);
    color: var(--text);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
  }

  :focus-visible {
    outline: none;
    box-shadow: var(--focus-ring);
    border-radius: 8px;
  }

  /* ---------- Header ---------- */
  header {
    position: sticky;
    top: 0;
    z-index: 20;
    padding: 16px 28px;
    background: var(--bg-translucent);
    backdrop-filter: blur(14px) saturate(160%);
    -webkit-backdrop-filter: blur(14px) saturate(160%);
    border-bottom: 1px solid var(--border);
  }

  .masthead {
    max-width: 1180px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 9px;
    text-decoration: none;
    color: inherit;
  }

  .brand .logo-dot {
    width: 11px;
    height: 11px;
    border-radius: 999px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    box-shadow: 0 0 14px var(--accent);
    flex: 0 0 auto;
  }

  .brand .wordmark {
    font-size: 19px;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  .brand .tagline {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    margin-left: 2px;
  }

  .edition-date {
    font-size: 12.5px;
    font-weight: 600;
    color: var(--muted);
  }

  /* ---------- Category tabs ---------- */
  .category-tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 16px 28px 4px;
    max-width: 1180px;
    margin: 0 auto;
  }

  .category-tabs:empty { display: none; }

  .category-tab {
    padding: 7px 16px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--muted);
    font-family: var(--sans);
    font-size: 12.5px;
    font-weight: 600;
    cursor: pointer;
    transition: color 200ms var(--ease), border-color 200ms var(--ease), background 200ms var(--ease);
  }

  .category-tab:hover { border-color: var(--accent); color: var(--text); }

  .category-tab.active {
    background: linear-gradient(135deg, var(--accent), #8f6bff);
    color: #fff;
    border-color: transparent;
    box-shadow: 0 6px 16px -6px var(--accent);
  }

  main {
    padding: 20px 28px 64px;
    max-width: 1180px;
    margin: 0 auto;
  }

  .status-line {
    padding: 4px 2px 16px;
    color: var(--muted);
    font-size: 13px;
    font-weight: 600;
  }

  .legend {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 16px;
    margin-bottom: 32px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 999px;
    box-shadow: var(--shadow-sm);
    font-size: 12.5px;
    color: var(--muted);
    font-weight: 500;
    width: fit-content;
    max-width: 100%;
  }

  .legend .swatch {
    width: 16px;
    height: 16px;
    border-radius: 6px;
    background: linear-gradient(135deg, #ef4444, #22c55e);
    flex: 0 0 auto;
  }

  /* ---------- Notices / skeletons ---------- */
  .notice {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    padding: 64px 20px;
    text-align: center;
    color: var(--muted);
    border: 1px dashed var(--border);
    border-radius: var(--radius-lg);
  }

  .notice strong { color: var(--text); font-size: 17px; font-weight: 800; }

  .skeleton {
    background: linear-gradient(90deg, var(--track) 25%, var(--border) 37%, var(--track) 63%);
    background-size: 400% 100%;
    animation: shimmer 1.4s ease infinite;
    height: 260px;
    border-radius: var(--radius-lg);
    border: 1px solid var(--border);
  }

  @keyframes shimmer {
    0% { background-position: 100% 0; }
    100% { background-position: -100% 0; }
  }

  /* ---------- Entrance animation ---------- */
  @keyframes riseIn {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ---------- Topic feed ---------- */
  .topic-section {
    margin-bottom: 48px;
    padding-top: 28px;
    border-top: 1px solid var(--border);
    animation: riseIn 520ms var(--ease) both;
  }

  .topic-section:first-child {
    border-top: none;
    padding-top: 0;
  }

  /* 키워드가 겹쳐 같은 묶음으로 판단된, 바로 앞 주제와 이어지는 두 번째 이후 항목.
     구분선 없이 간격만 좁혀서 시각적으로 더 가깝게(연관 있게) 보이도록 합니다. */
  .topic-section.clustered {
    border-top: none;
    padding-top: 0;
    margin-top: -24px;
    margin-bottom: 40px;
  }

  .related-tag {
    display: block;
    font-size: 11.5px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 2px;
  }

  .topic-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 18px;
  }

  .topic-title-block {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .topic-category {
    display: inline-flex;
    align-self: flex-start;
    padding: 3px 11px;
    border-radius: 999px;
    background: var(--accent-soft);
    color: var(--accent);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.02em;
  }

  .topic-header h2 {
    margin: 0;
    font-size: 27px;
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1.25;
  }

  .topic-header .topic-meta {
    font-size: 12.5px;
    font-weight: 500;
    color: var(--muted);
    white-space: nowrap;
    margin-top: 6px;
  }

  .topic-empty {
    color: var(--muted);
    font-size: 13px;
    font-weight: 500;
  }

  .stance-summary {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 20px;
  }

  .stance-chip {
    padding: 4px 12px;
    border-radius: 999px;
    font-size: 11.5px;
    font-weight: 700;
  }

  .article-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 22px;
    align-items: start;
  }

  /* Diagonal gradient "border": credibility color meets the top-right edge,
     clickbait color meets the bottom-left edge, blending across the middle.
     On hover the same two colors bloom into a soft dual-tone glow, and the
     card spans two grid columns to make room for the detail breakdown. */
  .article-card-border {
    position: relative;
    z-index: 1;
    grid-column: span 1;
    padding: 3px;
    border-radius: calc(var(--radius-lg) + 3px);
    transition: transform 320ms var(--ease), box-shadow 320ms var(--ease);
    animation: riseIn 520ms var(--ease) both;
    /* 평상시에도 신뢰도/어그로도 색이 옅게 은은히 비치는 앰비언트 글로우 */
    box-shadow:
      -6px 8px 20px -14px var(--glow-a, transparent),
      6px -8px 20px -14px var(--glow-b, transparent);
  }

  /* 마우스 호버 또는 키보드 포커스(자식 링크에 focus) 시 카드를 넓혀 세부 분석을 펼칩니다. */
  .article-card-border:hover,
  .article-card-border:focus-within {
    grid-column: span 2;
    z-index: 20;
    transform: translateY(-6px);
    box-shadow:
      -14px 16px 38px -12px var(--glow-a, transparent),
      14px -14px 38px -12px var(--glow-b, transparent);
  }

  .article-card {
    display: flex;
    flex-direction: column;
    background: var(--card);
    border-radius: var(--radius-lg);
    overflow: hidden;
    box-shadow: var(--shadow-sm);
    cursor: pointer;
  }

  .article-card--nolink { cursor: default; }

  .article-card .thumb {
    width: 100%;
    aspect-ratio: 16 / 10;
    background: linear-gradient(135deg, var(--accent-soft), rgba(255, 107, 74, 0.1));
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .article-card .thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 550ms var(--ease);
  }

  .article-card-border:hover .thumb img,
  .article-card-border:focus-within .thumb img {
    transform: scale(1.06);
  }

  .article-card .thumb svg { opacity: 0.4; color: var(--accent); }

  .article-card .body {
    padding: 18px 18px 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex: 1;
  }

  .article-topic-kicker {
    font-size: 11.5px;
    font-weight: 700;
    color: var(--accent);
  }

  .article-source {
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .article-headline {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: 1;
  }

  .article-title {
    margin: 0;
    font-size: 15.5px;
    font-weight: 700;
    line-height: 1.4;
    letter-spacing: -0.01em;
    color: var(--text);
  }

  .article-title a {
    color: inherit;
    text-decoration: none;
  }
  .article-title a:hover { text-decoration: underline; text-underline-offset: 2px; }

  .article-dek {
    margin: 0;
    font-size: 12.5px;
    font-weight: 500;
    line-height: 1.5;
    color: var(--muted);
  }

  .stance-badge {
    align-self: flex-start;
    padding: 4px 12px;
    border-radius: 999px;
    font-size: 11.5px;
    font-weight: 700;
  }

  /* 카드에 마우스를 올리거나(:hover) 키보드로 포커스(:focus-within)하면 카드가
     그리드 2칸으로 넓어지면서(grid-column: span 2) 이 세부 분석 패널이 펼쳐집니다. */
  .article-detail {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
    max-height: 0;
    opacity: 0;
    overflow: hidden;
    transition: max-height 360ms var(--ease), opacity 240ms var(--ease);
  }

  .article-card-border:hover .article-detail,
  .article-card-border:focus-within .article-detail {
    max-height: 360px;
    opacity: 1;
  }

  .detail-col h4 {
    margin: 0 0 8px;
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .breakdown-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 7px;
  }

  .breakdown-label { flex: 0 0 96px; }

  .breakdown-track {
    flex: 1;
    height: 5px;
    border-radius: 999px;
    background: var(--track);
    overflow: hidden;
  }

  .breakdown-fill {
    height: 100%;
    width: 0;
    border-radius: 999px;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    transition: width 560ms var(--ease) 120ms;
  }

  .article-card-border:hover .breakdown-fill,
  .article-card-border:focus-within .breakdown-fill {
    width: var(--target-width);
  }

  .breakdown-value {
    flex: 0 0 32px;
    text-align: right;
    color: var(--text);
    font-weight: 600;
  }

  details.reason {
    font-size: 12.5px;
    color: var(--muted);
    border-top: 1px solid var(--border);
    padding-top: 10px;
  }

  details.reason summary {
    cursor: pointer;
    font-weight: 600;
    color: var(--accent);
    list-style: none;
  }
  details.reason summary::-webkit-details-marker { display: none; }
  details.reason p { margin: 6px 0 0; line-height: 1.5; color: var(--text); }

  /* 모션에 민감한 사용자를 위해 애니메이션/전환을 비활성화합니다. */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.001ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.001ms !important;
    }
  }
</style>
</head>
<body>

<header>
  <div class="masthead">
    <a class="brand" href="/">
      <span class="logo-dot"></span>
      <span class="wordmark">Intone</span>
      <span class="tagline">Cross-checked news</span>
    </a>
    <span class="edition-date" id="editionDate"></span>
  </div>
</header>

<nav class="category-tabs" id="categoryTabs" aria-label="카테고리"></nav>

<main id="app">
  <p class="status-line">불러오는 중...</p>
</main>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
  import {
    getFirestore, collection, query, orderBy, limit, onSnapshot, doc, getDoc
  } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

  // ═══════════════════════════════════════════════════════════════
  // 설정
  // ═══════════════════════════════════════════════════════════════

  // Intone 확장 프로그램이 신뢰도/관점 분석을 쌓아두는 공유 Firestore.
  // 웹 API 키는 클라이언트 공개용이며, 접근 제어는 Firestore 보안 규칙(allow read: if true)이 담당합니다.
  const firebaseConfig = {
    apiKey: "AIzaSyBQT-UNNgB5Ujlkw_RFsPNsfKfj0jIXQnY",
    projectId: "intone-analysis"
  };

  const TOPIC_FETCH_LIMIT = 30;          // 한 번에 불러올 최근 주제 수
  const RELATED_OVERLAP_THRESHOLD = 0.2; // 두 주제를 "연관"으로 볼 키워드 겹침 비율(Jaccard)
  const CARD_STAGGER_MS = 55;            // 카드 등장 애니메이션 간격
  const SECTION_STAGGER_MS = 85;         // 섹션 등장 애니메이션 간격
  const MAX_STAGGER_STEPS = 8;           // 지연 누적 상한 (많은 항목일 때 마지막이 너무 늦게 뜨지 않게)

  // Intone이 새 topic을 만들 때 매기는 고정 대분류와 순서를 맞춥니다.
  const CATEGORY_ORDER = ["정치", "경제", "사회", "국제", "문화", "과학기술", "스포츠", "연예", "기타"];

  // 부정 ~ 긍정 단일 스펙트럼. 배열 순서가 곧 스펙트럼 위치를 나타냅니다.
  const STANCE_ORDER = ["매우 부정적", "약간 부정적", "중립적", "약간 긍정적", "매우 긍정적"];
  const STANCE_COLORS = {
    "매우 부정적": { bg: "rgba(239, 68, 68, 0.14)", fg: "#dc2626" },
    "약간 부정적": { bg: "rgba(249, 115, 22, 0.14)", fg: "#c2620a" },
    "중립적":     { bg: "rgba(107, 114, 128, 0.14)", fg: "#6b7280" },
    "약간 긍정적": { bg: "rgba(56, 145, 255, 0.14)",  fg: "#2563eb" },
    "매우 긍정적": { bg: "rgba(99, 102, 241, 0.16)",  fg: "#4f46e5" }
  };
  const STANCE_FALLBACK = STANCE_COLORS["중립적"];

  // Intone 확장의 세부 분석 팝업(content-popup.js)과 항목/배점을 그대로 맞춘
  // 목록입니다 — 같은 데이터를 같은 기준으로 보여줘야 하므로.
  const CREDIBILITY_ROWS = [
    ["source_clarity", "공식 출처 인용", 20],
    ["title_body_match", "제목/본문 일치", 25],
    ["evidence_quality", "근거 충실도", 25],
    ["neutrality", "객관적 표현 사용", 15],
    ["context", "맥락 제공성", 15]
  ];
  const CLICKBAIT_ROWS = [
    ["exaggeration", "과장된 표현", 20],
    ["curiosity_gap", "궁금증 유도", 20],
    ["title_body_mismatch", "선정적 제목", 25],
    ["emotional_trigger", "감정 자극", 20],
    ["hidden_key_info", "핵심 정보 은폐", 15]
  ];

  const PLACEHOLDER_ICON = `
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="3" y="4" width="18" height="16" rx="2" stroke="currentColor" stroke-width="1.6"/>
      <path d="M7 9H17M7 13H14M7 17H11" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
    </svg>
  `;

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const appEl = document.getElementById("app");
  const categoryTabsEl = document.getElementById("categoryTabs");

  document.getElementById("editionDate").textContent = new Date().toLocaleDateString("ko-KR", {
    year: "numeric", month: "long", day: "numeric", weekday: "long"
  });

  // ═══════════════════════════════════════════════════════════════
  // 순수 유틸리티
  // ═══════════════════════════════════════════════════════════════

  function escapeHtml(value) {
    return String(value ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  // 공개 쓰기 가능한 Firestore에서 온 URL이므로, http/https만 신뢰합니다.
  // javascript:, data: 같은 위험한 스킴은 빈 문자열로 걸러 링크/이동에서 제외합니다.
  function safeHttpUrl(url) {
    try {
      const parsed = new URL(url);
      return (parsed.protocol === "http:" || parsed.protocol === "https:") ? parsed.href : "";
    } catch (error) {
      return "";
    }
  }

  function timeAgo(epochMs) {
    if (!epochMs) return "";
    const diffMs = Date.now() - epochMs;
    if (diffMs < 0) return "방금 전";
    const mins = Math.floor(diffMs / 60000);
    if (mins < 1) return "방금 전";
    if (mins < 60) return `${mins}분 전`;
    const hours = Math.floor(mins / 60);
    if (hours < 24) return `${hours}시간 전`;
    const days = Math.floor(hours / 24);
    return `${days}일 전`;
  }

  function domainOf(url) {
    try {
      return new URL(url).hostname.replace(/^www\./, "");
    } catch (error) {
      return "출처 미상";
    }
  }

  async function sha256Hex(text) {
    const digest = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(text));
    return Array.from(new Uint8Array(digest)).map((b) => b.toString(16).padStart(2, "0")).join("");
  }

  function staggerDelay(index, step) {
    return Math.min(index, MAX_STAGGER_STEPS) * step;
  }

  // ── 점수 → 색상 ────────────────────────────────────────────────
  // 0~100 점수를 빨강(나쁨)~주황~노랑~초록(좋음)의 다단계 색상으로 변환합니다.
  // hue만 회전시키면 중간 구간이 탁한 올리브색으로 뭉개져 대비가 약해지므로,
  // 뚜렷이 구분되는 색 정지점 사이를 RGB로 보간합니다 — 신호등처럼 한눈에 대비됩니다.
  const SCORE_COLOR_STOPS = [
    { at: 0,   rgb: [220, 38, 38] },   // 빨강 (나쁨)
    { at: 33,  rgb: [249, 115, 22] },  // 주황
    { at: 66,  rgb: [234, 179, 8] },   // 노랑
    { at: 100, rgb: [22, 197, 94] }    // 초록 (좋음)
  ];

  function lerp(a, b, t) {
    return a + (b - a) * t;
  }

  function scoreToRgb(goodness) {
    const clamped = Math.max(0, Math.min(100, goodness));
    for (let i = 0; i < SCORE_COLOR_STOPS.length - 1; i += 1) {
      const cur = SCORE_COLOR_STOPS[i];
      const next = SCORE_COLOR_STOPS[i + 1];
      if (clamped >= cur.at && clamped <= next.at) {
        const t = (clamped - cur.at) / (next.at - cur.at);
        return cur.rgb.map((channel, index) => Math.round(lerp(channel, next.rgb[index], t)));
      }
    }
    return SCORE_COLOR_STOPS[SCORE_COLOR_STOPS.length - 1].rgb;
  }

  // invert가 true면 점수가 높을수록 나쁜 지표(어그로도)에 맞게 축을 뒤집습니다.
  function scoreToRgbColor(score, invert) {
    const clamped = Math.max(0, Math.min(100, Number(score) || 0));
    const goodness = invert ? 100 - clamped : clamped;
    return scoreToRgb(goodness);
  }

  function rgbToCss([r, g, b], alpha) {
    return alpha === undefined ? `rgb(${r}, ${g}, ${b})` : `rgba(${r}, ${g}, ${b}, ${alpha})`;
  }

  function lightenRgb([r, g, b], amount) {
    return [r, g, b].map((c) => Math.round(c + (255 - c) * amount));
  }

  // ── Jaccard 유사도: 두 키워드 집합의 교집합 크기 / 합집합 크기 ──
  function keywordOverlapRatio(keywordsA, keywordsB) {
    const setA = new Set(Array.isArray(keywordsA) ? keywordsA : []);
    const setB = new Set(Array.isArray(keywordsB) ? keywordsB : []);
    if (!setA.size || !setB.size) return 0;
    let intersection = 0;
    setA.forEach((kw) => { if (setB.has(kw)) intersection += 1; });
    const union = new Set([...setA, ...setB]).size;
    return union === 0 ? 0 : intersection / union;
  }

  // ═══════════════════════════════════════════════════════════════
  // 렌더링 조각
  // ═══════════════════════════════════════════════════════════════

  function renderNotice(title, detail) {
    appEl.innerHTML = `
      <div class="notice">
        <strong>${escapeHtml(title)}</strong>
        <span>${escapeHtml(detail)}</span>
      </div>
    `;
  }

  function renderSkeleton() {
    const items = Array.from({ length: 4 }, () => `<div class="skeleton"></div>`).join("");
    appEl.innerHTML = `<p class="status-line">불러오는 중...</p><div class="article-grid">${items}</div>`;
  }

  function renderBreakdownRows(breakdown, rows) {
    return rows.map(([key, label, max]) => {
      const raw = Number(breakdown?.[key]);
      const value = Number.isFinite(raw) ? Math.max(0, Math.min(max, raw)) : 0;
      const pct = max ? Math.round((value / max) * 100) : 0;
      return `
        <div class="breakdown-row">
          <span class="breakdown-label">${escapeHtml(label)}</span>
          <div class="breakdown-track"><div class="breakdown-fill" style="--target-width:${pct}%"></div></div>
          <span class="breakdown-value">${value}/${max}</span>
        </div>
      `;
    }).join("");
  }

  // 이 주제에 달린 기사들의 관점(stance) 분포를 스펙트럼 순서대로 칩으로 보여줍니다.
  function stanceSummary(articles) {
    const counts = new Map();
    articles.forEach(({ analysis }) => {
      const stance = analysis.direction?.stance;
      if (stance) counts.set(stance, (counts.get(stance) || 0) + 1);
    });
    if (!counts.size) return "";

    // 알려진 스펙트럼 값을 순서대로, 그 외(구버전 값 등)는 뒤에 붙여 하나도 빠뜨리지 않습니다.
    const known = STANCE_ORDER.filter((stance) => counts.has(stance));
    const unknown = [...counts.keys()].filter((stance) => !STANCE_ORDER.includes(stance));
    const chips = [...known, ...unknown].map((stance) => {
      const color = STANCE_COLORS[stance] || STANCE_FALLBACK;
      return `<span class="stance-chip" style="background:${color.bg};color:${color.fg}">${escapeHtml(stance)} ${counts.get(stance)}</span>`;
    }).join("");

    return `<div class="stance-summary">${chips}</div>`;
  }

  function createArticleCard(article, analysis, delayMs, topicLabel) {
    const href = safeHttpUrl(article.url);

    const stance = analysis.direction?.stance;
    const stanceColor = STANCE_COLORS[stance] || STANCE_FALLBACK;
    const stanceBadge = stance
      ? `<span class="stance-badge" style="background:${stanceColor.bg};color:${stanceColor.fg}">${escapeHtml(stance)}</span>`
      : "";

    // 주제 섹션 헤더 없이 단독으로 표시되는 카드(기사 1개짜리 주제 모음)에서만
    // 어떤 이슈인지 알 수 있도록 작게 표시합니다.
    const topicKicker = topicLabel
      ? `<span class="article-topic-kicker">${escapeHtml(topicLabel)}</span>`
      : "";

    const reason = analysis.direction?.reason
      ? `<details class="reason"><summary>이 관점으로 본 이유</summary><p>${escapeHtml(analysis.direction.reason)}</p></details>`
      : "";

    // 카드를 넓힐 때(호버/포커스) 펼쳐지는 세부 분석 — Intone 팝업과 같은 항목/배점.
    const detailPanel = `
      <div class="article-detail">
        <div class="detail-col">
          <h4>신뢰도 세부</h4>
          ${renderBreakdownRows(analysis.credibility_breakdown, CREDIBILITY_ROWS)}
        </div>
        <div class="detail-col">
          <h4>어그로도 세부</h4>
          ${renderBreakdownRows(analysis.clickbait_breakdown, CLICKBAIT_ROWS)}
        </div>
      </div>
    `;

    // 실제 기사 제목을 메인 헤드라인으로, AI 한 줄 요약은 그 아래 보조 설명으로.
    // article_title이 없던 옛날 기사는 요약을 대신 헤드라인 자리에 보여줍니다.
    const hasTitle = Boolean(analysis.article_title);
    const headlineText = escapeHtml(hasTitle ? analysis.article_title : (analysis.article_summary || "제목 없음"));
    const headline = href
      ? `<a href="${escapeHtml(href)}" target="_blank" rel="noopener noreferrer">${headlineText}</a>`
      : headlineText;
    const dek = hasTitle && analysis.article_summary
      ? `<p class="article-dek">${escapeHtml(analysis.article_summary)}</p>`
      : "";

    // 오른쪽 위 대각선 = 신뢰도, 왼쪽 아래 대각선 = 어그로도. 신호등 색으로 또렷하게
    // 대비시키고, 같은 두 색을 옅게 밝혀 은은한 글로우(호버 시 진하게)도 만듭니다.
    const credibilityRgb = scoreToRgbColor(analysis.credibility_score, false);
    const clickbaitRgb = scoreToRgbColor(analysis.clickbait_score, true);

    const wrapper = document.createElement("div");
    wrapper.className = "article-card-border";
    wrapper.style.background = `linear-gradient(45deg, ${rgbToCss(clickbaitRgb)}, ${rgbToCss(credibilityRgb)})`;
    wrapper.style.setProperty("--glow-a", rgbToCss(lightenRgb(clickbaitRgb, 0.15), 0.55));
    wrapper.style.setProperty("--glow-b", rgbToCss(lightenRgb(credibilityRgb, 0.15), 0.55));
    wrapper.style.animationDelay = `${delayMs}ms`;
    wrapper.innerHTML = `
      <div class="article-card${href ? "" : " article-card--nolink"}">
        <div class="thumb">
          ${analysis.image_url ? `<img src="${escapeHtml(analysis.image_url)}" alt="" loading="lazy">` : PLACEHOLDER_ICON}
        </div>
        <div class="body">
          ${topicKicker}
          <span class="article-source">${escapeHtml(domainOf(article.url))}</span>
          <div class="article-headline">
            <h3 class="article-title">${headline}</h3>
            ${dek}
          </div>
          ${stanceBadge}
          ${detailPanel}
          ${reason}
        </div>
      </div>
    `;

    const thumbEl = wrapper.querySelector(".thumb");
    const thumbImg = thumbEl.querySelector("img");
    if (thumbImg) {
      thumbImg.addEventListener("error", () => { thumbEl.innerHTML = PLACEHOLDER_ICON; });
    }

    // 카드 어디를 클릭하든 기사로 이동(편의 기능). 단, (1) 링크/펼치기(details) 요소를
    // 눌렀거나 (2) 텍스트를 드래그 선택 중이거나 (3) 안전한 URL이 없으면 건너뜁니다.
    if (href) {
      const cardEl = wrapper.querySelector(".article-card");
      cardEl.addEventListener("click", (event) => {
        if (event.target.closest("a, details")) return;
        if (String(window.getSelection?.() || "").length > 0) return;
        window.open(href, "_blank", "noopener,noreferrer");
      });
    }

    return wrapper;
  }

  function buildArticleGrid(items) {
    const gridEl = document.createElement("div");
    gridEl.className = "article-grid";
    items.forEach(({ article, analysis, topicLabel }, index) => {
      gridEl.appendChild(createArticleCard(article, analysis, staggerDelay(index, CARD_STAGGER_MS), topicLabel));
    });
    return gridEl;
  }

  function topicHeaderHtml(topic, metaText, isClustered) {
    const relatedTag = isClustered ? `<span class="related-tag">관련 이슈</span>` : "";
    const categoryKicker = topic.category
      ? `<span class="topic-category">${escapeHtml(topic.category)}</span>`
      : "";
    return `
      <div class="topic-header">
        <div class="topic-title-block">
          ${relatedTag}
          ${categoryKicker}
          <h2>${escapeHtml(topic.topic || "제목 없음")}</h2>
        </div>
        <span class="topic-meta">${escapeHtml(metaText)}</span>
      </div>
    `;
  }

  function renderTopicSection(topic, articles, sectionDelayMs, isClustered) {
    const sectionEl = document.createElement("section");
    sectionEl.className = isClustered ? "topic-section clustered" : "topic-section";
    sectionEl.style.animationDelay = `${sectionDelayMs}ms`;

    if (!articles.length) {
      sectionEl.innerHTML =
        topicHeaderHtml(topic, `${timeAgo(topic.updatedAt)} 업데이트`, isClustered) +
        `<p class="topic-empty">이 이슈에 연결된 기사의 분석 기록을 찾지 못했습니다.</p>`;
      return sectionEl;
    }

    sectionEl.innerHTML =
      topicHeaderHtml(topic, `${articles.length}개 매체 보도 · ${timeAgo(topic.updatedAt)} 업데이트`, isClustered) +
      stanceSummary(articles);
    sectionEl.appendChild(buildArticleGrid(articles));
    return sectionEl;
  }

  // ═══════════════════════════════════════════════════════════════
  // 데이터 로딩
  // ═══════════════════════════════════════════════════════════════

  // 한 주제(topic)의 articleUrls를 해시해 analysisResults에서 분석 기록을 조회합니다.
  // 중복 URL은 한 번만, 기록이 없거나 기사가 아닌 문서는 조용히 건너뜁니다.
  async function loadTopicArticles(topic) {
    const urls = [...new Set((Array.isArray(topic.articleUrls) ? topic.articleUrls : []).filter(Boolean))];
    const docIds = await Promise.all(urls.map((url) => sha256Hex(url)));
    const articleDocs = await Promise.all(
      docIds.map((docId) => getDoc(doc(db, "analysisResults", docId)).catch(() => null))
    );

    const articles = [];
    articleDocs.forEach((docSnap, index) => {
      if (!docSnap || !docSnap.exists()) return;
      const analysis = docSnap.data();
      if (!analysis || !analysis.is_article) return;
      articles.push({ article: { url: urls[index] }, analysis });
    });
    return articles;
  }

  // ═══════════════════════════════════════════════════════════════
  // 연관 주제 클러스터링 (키워드 겹침 기반, 클라이언트에서만 계산)
  // ═══════════════════════════════════════════════════════════════

  // 서로 다른 topic이라도 core_keywords가 어느 정도 겹치면 연관 있다고 보고 Union-Find로
  // 묶습니다. 묶음 안은 최신순, 묶음끼리는 묶음의 최신 updatedAt 순으로 정렬한 뒤 평평한
  // 배열로 반환하며, 각 항목에 isClustered(묶음의 2번째 이후 항목인지)를 붙입니다.
  function clusterRelatedTopics(sections) {
    const parent = sections.map((_, i) => i);
    const find = (i) => {
      while (parent[i] !== i) {
        parent[i] = parent[parent[i]];
        i = parent[i];
      }
      return i;
    };
    const union = (a, b) => {
      const rootA = find(a);
      const rootB = find(b);
      if (rootA !== rootB) parent[rootA] = rootB;
    };

    for (let i = 0; i < sections.length; i += 1) {
      for (let j = i + 1; j < sections.length; j += 1) {
        if (keywordOverlapRatio(sections[i].topic.keywords, sections[j].topic.keywords) >= RELATED_OVERLAP_THRESHOLD) {
          union(i, j);
        }
      }
    }

    const clusters = new Map();
    sections.forEach((section, i) => {
      const root = find(i);
      if (!clusters.has(root)) clusters.set(root, []);
      clusters.get(root).push(section);
    });

    const clusterList = [...clusters.values()];
    clusterList.forEach((members) => members.sort((a, b) => (b.topic.updatedAt || 0) - (a.topic.updatedAt || 0)));
    clusterList.sort((a, b) => (b[0].topic.updatedAt || 0) - (a[0].topic.updatedAt || 0));

    const ordered = [];
    clusterList.forEach((members) => {
      members.forEach((section, index) => ordered.push({ ...section, isClustered: index > 0 }));
    });
    return ordered;
  }

  // ═══════════════════════════════════════════════════════════════
  // 피드 렌더링 + 상태
  // ═══════════════════════════════════════════════════════════════

  let currentSections = [];       // [{ topic, articles }]
  let activeCategory = "전체";
  let renderGeneration = 0;        // onSnapshot 재호출 시 오래된 async 렌더가 최신을 덮어쓰지 않게 하는 토큰
  let feedListEl = null;
  let feedStatusEl = null;

  function renderCategoryTabs() {
    const present = new Set(currentSections.map(({ topic }) => topic.category).filter(Boolean));
    if (!present.size) {
      categoryTabsEl.innerHTML = "";
      return;
    }

    const categories = ["전체", ...CATEGORY_ORDER.filter((c) => present.has(c))];
    categoryTabsEl.innerHTML = categories.map((category) => `
      <button class="category-tab${category === activeCategory ? " active" : ""}" type="button" data-category="${escapeHtml(category)}"${category === activeCategory ? ' aria-current="true"' : ""}>${escapeHtml(category)}</button>
    `).join("");

    categoryTabsEl.querySelectorAll(".category-tab").forEach((btn) => {
      btn.addEventListener("click", () => {
        if (btn.dataset.category === activeCategory) return;
        activeCategory = btn.dataset.category;
        renderCategoryTabs();
        renderFilteredFeed();
      });
    });
  }

  // 기사가 딱 1개뿐인 주제는 "비교"라는 취지에 안 맞고, 섹션 하나씩 차지하면 공간을
  // 낭비하므로, 제목 없이 한데 모아 카드 그리드로만(여러 줄로 흐르게) 표시합니다.
  function renderFilteredFeed() {
    if (!feedListEl) return;

    const filtered = activeCategory === "전체"
      ? currentSections
      : currentSections.filter(({ topic }) => topic.category === activeCategory);

    const headed = filtered.filter(({ articles }) => articles.length !== 1);
    const singles = filtered
      .filter(({ articles }) => articles.length === 1)
      .sort((a, b) => (b.topic.updatedAt || 0) - (a.topic.updatedAt || 0));

    const ordered = clusterRelatedTopics(headed);

    if (feedStatusEl) {
      feedStatusEl.textContent = activeCategory === "전체"
        ? `최근 이슈 ${filtered.length}건`
        : `${activeCategory} 이슈 ${filtered.length}건`;
    }

    const fragment = document.createDocumentFragment();
    ordered.forEach(({ topic, articles, isClustered }, index) => {
      fragment.appendChild(renderTopicSection(topic, articles, staggerDelay(index, SECTION_STAGGER_MS), isClustered));
    });

    if (singles.length) {
      const poolEl = document.createElement("section");
      poolEl.className = "topic-section";
      poolEl.style.animationDelay = `${staggerDelay(ordered.length, SECTION_STAGGER_MS)}ms`;
      poolEl.appendChild(buildArticleGrid(singles.map(({ topic, articles }) => ({
        article: articles[0].article,
        analysis: articles[0].analysis,
        topicLabel: topic.topic
      }))));
      fragment.appendChild(poolEl);
    }

    feedListEl.replaceChildren(fragment);
  }

  async function renderFeed(topics) {
    const gen = ++renderGeneration;

    if (!topics.length) {
      currentSections = [];
      feedListEl = null;
      feedStatusEl = null;
      categoryTabsEl.innerHTML = "";
      renderNotice("표시할 이슈가 없습니다", "아직 분석된 기사가 쌓이지 않았습니다.");
      return;
    }

    // 스캐폴드를 먼저 세워 로딩 흔적을 지웁니다.
    appEl.innerHTML = `
      <p class="status-line" id="feedStatus">최근 이슈 ${topics.length}건</p>
      <div class="legend"><span class="swatch"></span>기사 테두리 색: 오른쪽 위 = 신뢰도, 왼쪽 아래 = 어그로도 (빨강 낮음 · 초록 높음)</div>
      <div id="feedList"></div>
    `;
    feedStatusEl = document.getElementById("feedStatus");
    feedListEl = document.getElementById("feedList");

    const sections = await Promise.all(
      topics.map(async (topic) => ({ topic, articles: await loadTopicArticles(topic) }))
    );

    // 이 렌더가 진행되는 사이 더 새로운 스냅샷이 도착했으면 이 결과는 버립니다.
    if (gen !== renderGeneration) return;

    currentSections = sections;
    if (activeCategory !== "전체" && !CATEGORY_ORDER.includes(activeCategory)) {
      activeCategory = "전체";
    }

    renderCategoryTabs();
    renderFilteredFeed();
  }

  // ═══════════════════════════════════════════════════════════════
  // 부트스트랩 — topics를 최신순으로 실시간 구독
  // ═══════════════════════════════════════════════════════════════

  renderSkeleton();
  onSnapshot(
    query(collection(db, "topics"), orderBy("updatedAt", "desc"), limit(TOPIC_FETCH_LIMIT)),
    (snapshot) => {
      const topics = snapshot.docs.map((docSnap) => ({ id: docSnap.id, ...docSnap.data() }));
      renderFeed(topics).catch(() => {
        renderNotice("이슈를 표시하는 중 문제가 발생했습니다", "잠시 후 다시 시도해주세요.");
      });
    },
    () => {
      renderNotice("이슈 목록을 불러오지 못했습니다", "잠시 후 다시 시도해주세요.");
    }
  );
</script>

</body>
</html>
