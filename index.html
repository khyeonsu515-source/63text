<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>intone news</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f7f9;
    --bg-translucent: rgba(247, 247, 249, 0.78);
    --card: #ffffff;
    --text: #14151a;
    --muted: #6b7280;
    --border: #e7e7ec;
    --accent: #6d5ef8;
    --accent-2: #ff6b4a;
    --accent-soft: rgba(109, 94, 248, 0.12);
    --shadow-sm: 0 1px 2px rgba(20, 21, 26, 0.05);
    --track: #eef0f4;
    --sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Pretendard, "Noto Sans KR", sans-serif;
    --ease: cubic-bezier(0.16, 1, 0.3, 1);
    --radius-lg: 20px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0a0a0d;
      --bg-translucent: rgba(10, 10, 13, 0.78);
      --card: #17181f;
      --text: #f2f2f5;
      --muted: #969ab0;
      --border: #24252f;
      --accent: #8f84ff;
      --accent-2: #ff8464;
      --accent-soft: rgba(143, 132, 255, 0.16);
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
      --track: #1e1f28;
    }
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background:
      radial-gradient(640px circle at 6% -12%, var(--accent-soft), transparent 60%),
      radial-gradient(520px circle at 100% 0%, rgba(255, 107, 74, 0.08), transparent 55%),
      var(--bg);
    color: var(--text);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
  }

  /* ---------- Header ---------- */
  header {
    position: sticky;
    top: 0;
    z-index: 20;
    padding: 16px 28px;
    background: var(--bg-translucent);
    backdrop-filter: blur(14px) saturate(160%);
    -webkit-backdrop-filter: blur(14px) saturate(160%);
    border-bottom: 1px solid var(--border);
  }

  .masthead {
    max-width: 1180px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 9px;
    text-decoration: none;
    color: inherit;
  }

  .brand .logo-dot {
    width: 11px;
    height: 11px;
    border-radius: 999px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    box-shadow: 0 0 14px var(--accent);
    flex: 0 0 auto;
  }

  .brand .wordmark {
    font-size: 19px;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  .brand .tagline {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    margin-left: 2px;
  }

  .edition-date {
    font-size: 12.5px;
    font-weight: 600;
    color: var(--muted);
  }

  /* ---------- Category tabs ---------- */
  .category-tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 16px 28px 4px;
    max-width: 1180px;
    margin: 0 auto;
  }

  .category-tab {
    padding: 7px 16px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--muted);
    font-family: var(--sans);
    font-size: 12.5px;
    font-weight: 600;
    cursor: pointer;
    transition: all 200ms var(--ease);
  }

  .category-tab:hover { border-color: var(--accent); color: var(--text); }

  .category-tab.active {
    background: linear-gradient(135deg, var(--accent), #8f6bff);
    color: #fff;
    border-color: transparent;
    box-shadow: 0 6px 16px -6px var(--accent);
  }

  main {
    padding: 20px 28px 64px;
    max-width: 1180px;
    margin: 0 auto;
  }

  .status-line {
    padding: 4px 2px 16px;
    color: var(--muted);
    font-size: 13px;
    font-weight: 600;
  }

  .legend {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 16px;
    margin-bottom: 32px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 999px;
    box-shadow: var(--shadow-sm);
    font-size: 12.5px;
    color: var(--muted);
    font-weight: 500;
    width: fit-content;
  }

  .legend .swatch {
    width: 16px;
    height: 16px;
    border-radius: 6px;
    background: linear-gradient(135deg, #ef4444, #22c55e);
    flex: 0 0 auto;
  }

  /* ---------- Notices / skeletons ---------- */
  .notice {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    padding: 64px 20px;
    text-align: center;
    color: var(--muted);
    border: 1px dashed var(--border);
    border-radius: var(--radius-lg);
  }

  .notice strong { color: var(--text); font-size: 17px; font-weight: 800; }

  .skeleton {
    background: linear-gradient(90deg, var(--track) 25%, var(--border) 37%, var(--track) 63%);
    background-size: 400% 100%;
    animation: shimmer 1.4s ease infinite;
    height: 260px;
    border-radius: var(--radius-lg);
    border: 1px solid var(--border);
  }

  @keyframes shimmer {
    0% { background-position: 100% 0; }
    100% { background-position: -100% 0; }
  }

  /* ---------- Entrance animation ---------- */
  @keyframes riseIn {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ---------- Topic feed ---------- */
  .topic-section {
    margin-bottom: 48px;
    padding-top: 28px;
    border-top: 1px solid var(--border);
    animation: riseIn 520ms var(--ease) both;
  }

  .topic-section:first-child {
    border-top: none;
    padding-top: 0;
  }

  /* 키워드가 겹쳐 같은 묶음으로 판단된, 바로 앞 주제와 이어지는 두 번째 이후 항목.
     구분선 없이 간격만 좁혀서 시각적으로 더 가깝게(연관 있게) 보이도록 합니다. */
  .topic-section.clustered {
    border-top: none;
    padding-top: 0;
    margin-top: -24px;
    margin-bottom: 40px;
  }

  .related-tag {
    display: block;
    font-size: 11.5px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 2px;
  }

  .topic-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 18px;
  }

  .topic-title-block {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .topic-category {
    display: inline-flex;
    align-self: flex-start;
    padding: 3px 11px;
    border-radius: 999px;
    background: var(--accent-soft);
    color: var(--accent);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.02em;
  }

  .topic-header h2 {
    margin: 0;
    font-size: 27px;
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1.25;
  }

  .topic-header .topic-meta {
    font-size: 12.5px;
    font-weight: 500;
    color: var(--muted);
    white-space: nowrap;
    margin-top: 6px;
  }

  .stance-summary {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 20px;
  }

  .stance-chip {
    padding: 4px 12px;
    border-radius: 999px;
    font-size: 11.5px;
    font-weight: 700;
  }

  .article-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 22px;
  }

  /* Diagonal gradient "border": credibility color meets the top-right edge,
     clickbait color meets the bottom-left edge, blending across the middle.
     On hover the same two colors bloom into a soft dual-tone glow. */
  .article-card-border {
    padding: 2px;
    border-radius: calc(var(--radius-lg) + 2px);
    transition: transform 320ms var(--ease), box-shadow 320ms var(--ease);
    animation: riseIn 520ms var(--ease) both;
  }

  .article-card-border:hover {
    transform: translateY(-6px);
    box-shadow:
      -10px 12px 30px -12px var(--glow-a, transparent),
      10px -10px 30px -12px var(--glow-b, transparent);
  }

  .article-card {
    display: flex;
    flex-direction: column;
    background: var(--card);
    border-radius: var(--radius-lg);
    overflow: hidden;
    height: 100%;
    box-shadow: var(--shadow-sm);
  }

  .article-card .thumb {
    width: 100%;
    aspect-ratio: 16 / 10;
    background: linear-gradient(135deg, var(--accent-soft), rgba(255, 107, 74, 0.1));
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .article-card .thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 550ms var(--ease);
  }

  .article-card-border:hover .thumb img {
    transform: scale(1.06);
  }

  .article-card .thumb svg { opacity: 0.4; color: var(--accent); }

  .article-card .body {
    padding: 18px 18px 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex: 1;
  }

  .article-topic-kicker {
    font-size: 11.5px;
    font-weight: 700;
    color: var(--accent);
  }

  .article-source {
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .article-headline {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: 1;
  }

  .article-title {
    margin: 0;
    font-size: 15.5px;
    font-weight: 700;
    line-height: 1.4;
    letter-spacing: -0.01em;
    color: var(--text);
  }

  .article-dek {
    margin: 0;
    font-size: 12.5px;
    font-weight: 500;
    line-height: 1.5;
    color: var(--muted);
  }

  .stance-badge {
    align-self: flex-start;
    padding: 4px 12px;
    border-radius: 999px;
    font-size: 11.5px;
    font-weight: 700;
  }

  details.reason {
    font-size: 12.5px;
    color: var(--muted);
    border-top: 1px solid var(--border);
    padding-top: 10px;
  }

  details.reason summary {
    cursor: pointer;
    font-weight: 600;
    color: var(--accent);
    list-style: none;
  }
  details.reason summary::-webkit-details-marker { display: none; }
  details.reason p { margin: 6px 0 0; line-height: 1.5; color: var(--text); }

  .article-link {
    margin-top: 4px;
    align-self: flex-start;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12.5px;
    font-weight: 700;
    color: var(--text);
    text-decoration: none;
    padding: 8px 14px;
    border-radius: 999px;
    background: var(--bg);
    border: 1px solid var(--border);
    transition: all 200ms var(--ease);
  }
  .article-link:hover {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    transform: translateX(2px);
  }
</style>
</head>
<body>

<header>
  <div class="masthead">
    <a class="brand" href="/">
      <span class="logo-dot"></span>
      <span class="wordmark">Intone</span>
      <span class="tagline">Cross-checked news</span>
    </a>
    <span class="edition-date" id="editionDate"></span>
  </div>
</header>

<nav class="category-tabs" id="categoryTabs"></nav>

<main id="app">
  <p class="status-line">불러오는 중...</p>
</main>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
  import {
    getFirestore, collection, query, orderBy, limit, onSnapshot, doc, getDoc
  } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

  // Intone 확장 프로그램이 신뢰도/관점 분석을 쌓아두는 공유 Firestore.
  // 웹 API 키는 클라이언트 공개용이며, 접근 제어는 Firestore 보안 규칙(allow read: if true)이 담당합니다.
  const firebaseConfig = {
    apiKey: "AIzaSyBQT-UNNgB5Ujlkw_RFsPNsfKfj0jIXQnY",
    projectId: "intone-analysis"
  };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const appEl = document.getElementById("app");

  const editionDateEl = document.getElementById("editionDate");
  editionDateEl.textContent = new Date().toLocaleDateString("ko-KR", {
    year: "numeric", month: "long", day: "numeric", weekday: "long"
  });

  // 부정 ~ 긍정 단일 스펙트럼. 순서가 곧 스펙트럼 위치를 나타냅니다.
  const STANCE_COLORS = {
    "매우 부정적": { bg: "rgba(239, 68, 68, 0.14)", fg: "#dc2626" },
    "약간 부정적": { bg: "rgba(249, 115, 22, 0.14)", fg: "#c2620a" },
    "중립적":     { bg: "rgba(107, 114, 128, 0.14)", fg: "#6b7280" },
    "약간 긍정적": { bg: "rgba(56, 145, 255, 0.14)",  fg: "#2563eb" },
    "매우 긍정적": { bg: "rgba(99, 102, 241, 0.16)",  fg: "#4f46e5" }
  };
  const STANCE_ORDER = ["매우 부정적", "약간 부정적", "중립적", "약간 긍정적", "매우 긍정적"];

  const PLACEHOLDER_ICON = `
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="3" y="4" width="18" height="16" rx="2" stroke="currentColor" stroke-width="1.6"/>
      <path d="M7 9H17M7 13H14M7 17H11" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
    </svg>
  `;

  function escapeHtml(value) {
    return String(value ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function timeAgo(epochMs) {
    if (!epochMs) return "";
    const diffMs = Date.now() - epochMs;
    const mins = Math.floor(diffMs / 60000);
    if (mins < 1) return "방금 전";
    if (mins < 60) return `${mins}분 전`;
    const hours = Math.floor(mins / 60);
    if (hours < 24) return `${hours}시간 전`;
    const days = Math.floor(hours / 24);
    return `${days}일 전`;
  }

  function domainOf(url) {
    try {
      return new URL(url).hostname.replace(/^www\./, "");
    } catch (error) {
      return "출처 미상";
    }
  }

  async function sha256Hex(text) {
    const digest = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(text));
    return Array.from(new Uint8Array(digest)).map((b) => b.toString(16).padStart(2, "0")).join("");
  }

  // 0~100 점수를 빨강(나쁨)~초록(좋음) 축의 색상환 위치(hue)로 변환. invert가
  // true면 점수가 높을수록 나쁜 지표(어그로도)에 맞게 축을 뒤집습니다.
  function scoreHue(score, invert) {
    const clamped = Math.max(0, Math.min(100, Number(score) || 0));
    const goodness = invert ? 100 - clamped : clamped;
    return (goodness / 100) * 120;
  }

  function renderNotice(title, detail) {
    appEl.innerHTML = `
      <div class="notice">
        <strong>${escapeHtml(title)}</strong>
        <span>${escapeHtml(detail)}</span>
      </div>
    `;
  }

  function renderSkeleton() {
    const items = Array.from({ length: 4 }, () => `<div class="skeleton"></div>`).join("");
    appEl.innerHTML = `<p class="status-line">불러오는 중...</p><div class="article-grid">${items}</div>`;
  }

  function stanceSummary(articles) {
    const counts = new Map();
    articles.forEach(({ analysis }) => {
      const stance = analysis.direction?.stance;
      if (!stance) return;
      counts.set(stance, (counts.get(stance) || 0) + 1);
    });
    if (!counts.size) return "";

    const chips = STANCE_ORDER.filter((stance) => counts.has(stance)).map((stance) => {
      const color = STANCE_COLORS[stance] || STANCE_COLORS["중립적"];
      return `<span class="stance-chip" style="background:${color.bg};color:${color.fg}">${escapeHtml(stance)} ${counts.get(stance)}</span>`;
    }).join("");

    return `<div class="stance-summary">${chips}</div>`;
  }

  function createArticleCard(article, analysis, delayMs, topicLabel) {
    const stance = analysis.direction?.stance;
    const stanceColor = STANCE_COLORS[stance] || STANCE_COLORS["중립적"];
    const stanceBadge = stance
      ? `<span class="stance-badge" style="background:${stanceColor.bg};color:${stanceColor.fg}">${escapeHtml(stance)}</span>`
      : "";
    // 주제 섹션 헤더 없이 단독으로 표시되는 카드(비교 대상이 없는 1개짜리
    // 주제를 모아둔 영역)에서만 어떤 이슈인지 알 수 있도록 작게 표시합니다.
    const topicKicker = topicLabel
      ? `<span class="article-topic-kicker">${escapeHtml(topicLabel)}</span>`
      : "";
    const reason = analysis.direction?.reason
      ? `<details class="reason"><summary>이 관점으로 본 이유</summary><p>${escapeHtml(analysis.direction.reason)}</p></details>`
      : "";

    // 실제 기사 제목이 있으면 그걸 메인 헤드라인으로 보여주고, AI 한 줄 요약은
    // 그 아래 작은 보조 설명으로 덧붙입니다. article_title이 생기기 전에
    // 분석된 옛날 기사는 요약을 대신 메인으로 보여줍니다.
    const hasTitle = Boolean(analysis.article_title);
    const headlineText = hasTitle ? analysis.article_title : (analysis.article_summary || "");
    const dek = hasTitle && analysis.article_summary
      ? `<p class="article-dek">${escapeHtml(analysis.article_summary)}</p>`
      : "";

    // 오른쪽 위 대각선 = 신뢰도, 왼쪽 아래 대각선 = 어그로도. 같은 두 색으로
    // 호버 시 은은한 이중 톤 글로우도 같이 만듭니다(테두리는 진하게, 글로우는 옅게).
    const credibilityHue = scoreHue(analysis.credibility_score, false);
    const clickbaitHue = scoreHue(analysis.clickbait_score, true);
    const credibilityColor = `hsl(${credibilityHue}, 72%, 45%)`;
    const clickbaitColor = `hsl(${clickbaitHue}, 72%, 45%)`;
    const credibilityGlow = `hsla(${credibilityHue}, 85%, 60%, 0.45)`;
    const clickbaitGlow = `hsla(${clickbaitHue}, 85%, 60%, 0.45)`;

    const wrapper = document.createElement("div");
    wrapper.className = "article-card-border";
    wrapper.style.background = `linear-gradient(45deg, ${clickbaitColor}, ${credibilityColor})`;
    wrapper.style.setProperty("--glow-a", clickbaitGlow);
    wrapper.style.setProperty("--glow-b", credibilityGlow);
    wrapper.style.animationDelay = `${delayMs}ms`;
    wrapper.innerHTML = `
      <div class="article-card">
        <div class="thumb">
          ${analysis.image_url ? `<img src="${escapeHtml(analysis.image_url)}" alt="" loading="lazy">` : PLACEHOLDER_ICON}
        </div>
        <div class="body">
          ${topicKicker}
          <span class="article-source">${escapeHtml(domainOf(article.url))}</span>
          <div class="article-headline">
            <h3 class="article-title">${escapeHtml(headlineText)}</h3>
            ${dek}
          </div>
          ${stanceBadge}
          ${reason}
          <a class="article-link" href="${escapeHtml(article.url)}" target="_blank" rel="noopener noreferrer">원문 보기 →</a>
        </div>
      </div>
    `;

    const thumbImg = wrapper.querySelector(".thumb img");
    if (thumbImg) {
      const thumbEl = wrapper.querySelector(".thumb");
      thumbImg.addEventListener("error", () => { thumbEl.innerHTML = PLACEHOLDER_ICON; });
    }

    return wrapper;
  }

  // ─────────────────────────────────────────────
  // 주제별 기사 로딩 — topics.articleUrls를 해시해 analysisResults에서 조회
  // ─────────────────────────────────────────────
  async function loadTopicArticles(topic) {
    const urls = Array.isArray(topic.articleUrls) ? topic.articleUrls : [];
    const docIds = await Promise.all(urls.map((url) => sha256Hex(url)));
    const articleDocs = await Promise.all(
      docIds.map((docId) => getDoc(doc(db, "analysisResults", docId)).catch(() => null))
    );

    const articles = [];
    articleDocs.forEach((docSnap, index) => {
      if (!docSnap || !docSnap.exists()) return; // 분석 기록이 없으면 조용히 건너뜁니다.
      const analysis = docSnap.data();
      if (!analysis.is_article) return;
      articles.push({ article: { url: urls[index] }, analysis });
    });
    return articles;
  }

  function renderTopicSection(topic, articles, sectionDelayMs, isClustered) {
    const sectionEl = document.createElement("section");
    sectionEl.className = isClustered ? "topic-section clustered" : "topic-section";
    sectionEl.style.animationDelay = `${sectionDelayMs}ms`;

    const relatedTag = isClustered ? `<span class="related-tag">관련 이슈</span>` : "";
    const categoryKicker = topic.category
      ? `<span class="topic-category">${escapeHtml(topic.category)}</span>`
      : "";

    if (!articles.length) {
      sectionEl.innerHTML = `
        <div class="topic-header">
          <div class="topic-title-block">
            ${relatedTag}
            ${categoryKicker}
            <h2>${escapeHtml(topic.topic || "제목 없음")}</h2>
          </div>
          <span class="topic-meta">${escapeHtml(timeAgo(topic.updatedAt))} 업데이트</span>
        </div>
        <p class="status-line">이 이슈에 연결된 기사의 분석 기록을 찾지 못했습니다.</p>
      `;
      return sectionEl;
    }

    sectionEl.innerHTML = `
      <div class="topic-header">
        <div class="topic-title-block">
          ${relatedTag}
          ${categoryKicker}
          <h2>${escapeHtml(topic.topic || "제목 없음")}</h2>
        </div>
        <span class="topic-meta">${articles.length}개 매체 보도 · ${escapeHtml(timeAgo(topic.updatedAt))} 업데이트</span>
      </div>
      ${stanceSummary(articles)}
    `;

    const gridEl = document.createElement("div");
    gridEl.className = "article-grid";
    articles.forEach(({ article, analysis }, index) => {
      gridEl.appendChild(createArticleCard(article, analysis, index * 60));
    });
    sectionEl.appendChild(gridEl);

    return sectionEl;
  }

  // Intone이 새 topic을 만들 때 매기는 고정 대분류와 순서를 맞춥니다.
  const CATEGORY_ORDER = ["정치", "경제", "사회", "국제", "문화", "과학기술", "스포츠", "연예", "기타"];
  const categoryTabsEl = document.getElementById("categoryTabs");

  let currentSections = [];
  let activeCategory = "전체";

  function renderCategoryTabs() {
    const present = new Set(currentSections.map(({ topic }) => topic.category).filter(Boolean));
    if (!present.size) {
      categoryTabsEl.innerHTML = "";
      return;
    }

    const categories = ["전체", ...CATEGORY_ORDER.filter((c) => present.has(c))];
    categoryTabsEl.innerHTML = categories.map((category) => `
      <button class="category-tab${category === activeCategory ? " active" : ""}" data-category="${escapeHtml(category)}">${escapeHtml(category)}</button>
    `).join("");

    categoryTabsEl.querySelectorAll(".category-tab").forEach((btn) => {
      btn.addEventListener("click", () => {
        activeCategory = btn.dataset.category;
        renderCategoryTabs();
        renderFilteredFeed();
      });
    });
  }

  // 서로 다른 topic이라도 core_keywords가 어느 정도 겹치면 연관 있다고 보고
  // 화면에서 가까운 위치에 묶어서 보여줍니다. topics.keywords는 이미 있는
  // 값이라 Firestore 스키마 변경이나 추가 조회 없이 클라이언트에서만 계산합니다.
  const RELATED_TOPIC_OVERLAP_THRESHOLD = 0.2;

  // Jaccard 유사도: 두 키워드 집합의 교집합 크기 / 합집합 크기.
  function keywordOverlapRatio(keywordsA, keywordsB) {
    const setA = new Set(keywordsA || []);
    const setB = new Set(keywordsB || []);
    if (!setA.size || !setB.size) return 0;
    let intersection = 0;
    setA.forEach((kw) => { if (setB.has(kw)) intersection += 1; });
    const union = new Set([...setA, ...setB]).size;
    return union === 0 ? 0 : intersection / union;
  }

  // Union-Find로 키워드가 겹치는 topic들을 하나의 묶음으로 그룹화하고,
  // 묶음은 내부 최신순으로, 묶음끼리는 묶음의 최신 updatedAt 기준으로 정렬합니다.
  // 반환값은 평평한 배열이며, 각 항목에 isClustered(묶음의 2번째 이후 항목인지)를 붙입니다.
  function clusterRelatedTopics(sections) {
    const parent = sections.map((_, i) => i);
    function find(i) {
      while (parent[i] !== i) {
        parent[i] = parent[parent[i]];
        i = parent[i];
      }
      return i;
    }
    function union(a, b) {
      const rootA = find(a);
      const rootB = find(b);
      if (rootA !== rootB) parent[rootA] = rootB;
    }

    for (let i = 0; i < sections.length; i += 1) {
      for (let j = i + 1; j < sections.length; j += 1) {
        const ratio = keywordOverlapRatio(sections[i].topic.keywords, sections[j].topic.keywords);
        if (ratio >= RELATED_TOPIC_OVERLAP_THRESHOLD) {
          union(i, j);
        }
      }
    }

    const clusters = new Map();
    sections.forEach((section, i) => {
      const root = find(i);
      if (!clusters.has(root)) clusters.set(root, []);
      clusters.get(root).push(section);
    });

    const clusterList = [...clusters.values()].map((members) => {
      members.sort((a, b) => (b.topic.updatedAt || 0) - (a.topic.updatedAt || 0));
      return members;
    });
    clusterList.sort((a, b) => (b[0].topic.updatedAt || 0) - (a[0].topic.updatedAt || 0));

    const ordered = [];
    clusterList.forEach((members) => {
      members.forEach((section, index) => {
        ordered.push({ ...section, isClustered: index > 0 });
      });
    });
    return ordered;
  }

  // 기사가 딱 1개뿐인 주제는 "비교"라는 사이트 취지에 안 맞고, 이런 주제가
  // 많으면 한 줄(섹션)씩 차지하며 화면을 낭비합니다. 이런 주제들은 개별
  // 섹션(제목)을 안 만들고 한데 모아 카드 그리드로만 표시합니다 — 그리드는
  // 여러 줄로 자연스럽게 흐르므로 훨씬 촘촘하게 보여줄 수 있습니다.
  function renderFilteredFeed() {
    const filtered = activeCategory === "전체"
      ? currentSections
      : currentSections.filter(({ topic }) => topic.category === activeCategory);

    const headed = filtered.filter(({ articles }) => articles.length !== 1);
    const singles = filtered.filter(({ articles }) => articles.length === 1)
      .sort((a, b) => (b.topic.updatedAt || 0) - (a.topic.updatedAt || 0));

    const ordered = clusterRelatedTopics(headed);

    const feedListEl = document.getElementById("feedList");
    const statusEl = document.getElementById("feedStatus");
    if (statusEl) {
      statusEl.textContent = activeCategory === "전체"
        ? `최근 이슈 ${filtered.length}건`
        : `${activeCategory} 이슈 ${filtered.length}건`;
    }
    if (!feedListEl) return;

    feedListEl.innerHTML = "";
    ordered.forEach(({ topic, articles, isClustered }, index) => {
      feedListEl.appendChild(renderTopicSection(topic, articles, index * 90, isClustered));
    });

    if (singles.length) {
      const poolEl = document.createElement("section");
      poolEl.className = "topic-section";
      poolEl.style.animationDelay = `${ordered.length * 90}ms`;

      const gridEl = document.createElement("div");
      gridEl.className = "article-grid";
      singles.forEach(({ topic, articles }, index) => {
        const { article, analysis } = articles[0];
        gridEl.appendChild(createArticleCard(article, analysis, index * 60, topic.topic));
      });
      poolEl.appendChild(gridEl);
      feedListEl.appendChild(poolEl);
    }
  }

  async function renderFeed(topics) {
    if (!topics.length) {
      categoryTabsEl.innerHTML = "";
      appEl.innerHTML = "";
      renderNotice("표시할 이슈가 없습니다", "아직 분석된 기사가 쌓이지 않았습니다.");
      return;
    }

    appEl.innerHTML = `
      <p class="status-line" id="feedStatus">최근 이슈 ${topics.length}건</p>
      <div class="legend"><span class="swatch"></span>기사 테두리 색: 오른쪽 위 = 신뢰도, 왼쪽 아래 = 어그로도 (빨강 낮음 · 초록 높음)</div>
      <div id="feedList"></div>
    `;

    currentSections = await Promise.all(
      topics.map(async (topic) => {
        const articles = await loadTopicArticles(topic);
        return { topic, articles };
      })
    );
    if (!CATEGORY_ORDER.includes(activeCategory) && activeCategory !== "전체") {
      activeCategory = "전체"; // 활성 탭이 새 목록에 더 이상 없으면 전체로 되돌림
    }

    renderCategoryTabs();
    renderFilteredFeed();
  }

  const topicsQuery = query(collection(db, "topics"), orderBy("updatedAt", "desc"), limit(30));
  renderSkeleton();
  onSnapshot(
    topicsQuery,
    (snapshot) => {
      const topics = snapshot.docs.map((docSnap) => ({ id: docSnap.id, ...docSnap.data() }));
      renderFeed(topics);
    },
    () => {
      renderNotice("이슈 목록을 불러오지 못했습니다", "잠시 후 다시 시도해주세요.");
    }
  );
</script>

</body>
</html>
