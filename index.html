<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>intone news</title>
<style>
  :root {
    --bg: #f7f8fa;
    --card: #ffffff;
    --text: #0f172a;
    --muted: #64748b;
    --border: #e5e7eb;
    --accent-a: #3b82f6;
    --accent-b: #4338ca;
    --shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0b0f19;
      --card: #131826;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --border: #232a3a;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Pretendard, "Noto Sans KR", sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  header {
    position: sticky;
    top: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 28px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(8px);
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: inherit;
  }

  .brand svg { display: block; color: var(--accent-b); }

  .brand .wordmark {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.03em;
    color: var(--text);
  }

  main {
    padding: 20px 28px 60px;
    max-width: 1180px;
    margin: 0 auto;
  }

  .status-line {
    padding: 6px 4px 18px;
    color: var(--muted);
    font-size: 13px;
    font-weight: 600;
  }

  .legend {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    margin-bottom: 22px;
    border-radius: 14px;
    background: var(--card);
    border: 1px solid var(--border);
    font-size: 12px;
    color: var(--muted);
    font-weight: 600;
  }

  .legend .swatch {
    width: 14px;
    height: 14px;
    border-radius: 4px;
    background: linear-gradient(45deg, #dc2626, #16a34a);
    flex: 0 0 auto;
  }

  /* ---------- Notices / skeletons ---------- */
  .notice {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    padding: 60px 20px;
    text-align: center;
    color: var(--muted);
  }

  .notice strong { color: var(--text); font-size: 16px; }

  .skeleton {
    background: linear-gradient(90deg, var(--border) 25%, rgba(255,255,255,0.35) 37%, var(--border) 63%);
    background-size: 400% 100%;
    animation: shimmer 1.4s ease infinite;
    border-radius: 18px;
    height: 220px;
  }

  @keyframes shimmer {
    0% { background-position: 100% 0; }
    100% { background-position: -100% 0; }
  }

  /* ---------- Topic feed ---------- */
  .topic-section {
    margin-bottom: 36px;
  }

  .topic-header {
    display: flex;
    align-items: baseline;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }

  .topic-header h2 {
    margin: 0;
    font-size: 19px;
    font-weight: 800;
    letter-spacing: -0.01em;
  }

  .topic-header .topic-meta {
    font-size: 12.5px;
    font-weight: 700;
    color: var(--muted);
  }

  .stance-summary {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 14px;
  }

  .stance-chip {
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 11.5px;
    font-weight: 800;
  }

  .article-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }

  /* Diagonal gradient "border": credibility color meets the top-right edge,
     clickbait color meets the bottom-left edge, blending across the middle. */
  .article-card-border {
    padding: 4px;
    border-radius: 22px;
  }

  .article-card {
    display: flex;
    flex-direction: column;
    border-radius: 18px;
    background: var(--card);
    box-shadow: var(--shadow);
    overflow: hidden;
    height: 100%;
  }

  .article-card .thumb {
    width: 100%;
    aspect-ratio: 16 / 9;
    background: linear-gradient(135deg, rgba(59,130,246,0.16), rgba(67,56,202,0.16));
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .article-card .thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .article-card .thumb svg { opacity: 0.35; }

  .article-card .body {
    padding: 14px 16px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex: 1;
  }

  .article-source {
    font-size: 11px;
    font-weight: 800;
    color: var(--accent-b);
    text-transform: uppercase;
    letter-spacing: 0.02em;
  }

  .article-summary {
    margin: 0;
    font-size: 13.5px;
    line-height: 1.55;
    color: var(--text);
    flex: 1;
  }

  .stance-badge {
    align-self: flex-start;
    padding: 4px 12px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 800;
  }

  details.reason {
    font-size: 12.5px;
    color: var(--muted);
  }

  details.reason summary {
    cursor: pointer;
    font-weight: 700;
    color: var(--accent-b);
    list-style: none;
  }
  details.reason summary::-webkit-details-marker { display: none; }
  details.reason p { margin: 6px 0 0; line-height: 1.5; color: var(--text); }

  .article-link {
    margin-top: 4px;
    align-self: flex-start;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12.5px;
    font-weight: 800;
    color: var(--text);
    text-decoration: none;
    padding: 7px 14px;
    border-radius: 999px;
    border: 1px solid var(--border);
  }
  .article-link:hover { border-color: var(--accent-b); color: var(--accent-b); }
</style>
</head>
<body>

<header>
  <a class="brand" href="/">
    <svg width="30" height="30" viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="12.5" cy="12.5" r="8.5" stroke="currentColor" stroke-width="3"/>
      <path d="M18.5 18.5L25 25" stroke="currentColor" stroke-width="3.4" stroke-linecap="round"/>
    </svg>
    <span class="wordmark"><b>intone</b> news</span>
  </a>
</header>

<main id="app">
  <p class="status-line">불러오는 중...</p>
</main>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
  import {
    getFirestore, collection, query, orderBy, limit, onSnapshot, doc, getDoc
  } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

  // Intone 확장 프로그램이 신뢰도/관점 분석을 쌓아두는 공유 Firestore.
  // 웹 API 키는 클라이언트 공개용이며, 접근 제어는 Firestore 보안 규칙(allow read: if true)이 담당합니다.
  const firebaseConfig = {
    apiKey: "AIzaSyBQT-UNNgB5Ujlkw_RFsPNsfKfj0jIXQnY",
    projectId: "intone-analysis"
  };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const appEl = document.getElementById("app");

  const STANCE_COLORS = {
    "비판적": { bg: "rgba(239,68,68,0.14)", fg: "#dc2626" },
    "옹호적": { bg: "rgba(59,130,246,0.14)", fg: "#2563eb" },
    "긍정적": { bg: "rgba(249,115,22,0.14)", fg: "#ea580c" },
    "부정적": { bg: "rgba(249,115,22,0.14)", fg: "#ea580c" },
    "중립적": { bg: "rgba(100,116,139,0.14)", fg: "#64748b" }
  };
  const STANCE_ORDER = ["비판적", "옹호적", "긍정적", "부정적", "중립적"];

  const PLACEHOLDER_ICON = `
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="3" y="4" width="18" height="16" rx="2" stroke="currentColor" stroke-width="1.6"/>
      <path d="M7 9H17M7 13H14M7 17H11" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
    </svg>
  `;

  function escapeHtml(value) {
    return String(value ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function timeAgo(epochMs) {
    if (!epochMs) return "";
    const diffMs = Date.now() - epochMs;
    const mins = Math.floor(diffMs / 60000);
    if (mins < 1) return "방금 전";
    if (mins < 60) return `${mins}분 전`;
    const hours = Math.floor(mins / 60);
    if (hours < 24) return `${hours}시간 전`;
    const days = Math.floor(hours / 24);
    return `${days}일 전`;
  }

  function domainOf(url) {
    try {
      return new URL(url).hostname.replace(/^www\./, "");
    } catch (error) {
      return "출처 미상";
    }
  }

  async function sha256Hex(text) {
    const digest = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(text));
    return Array.from(new Uint8Array(digest)).map((b) => b.toString(16).padStart(2, "0")).join("");
  }

  // 0~100 점수를 빨강(나쁨)~초록(좋음) 색상으로 변환. invert가 true면
  // 점수가 높을수록 나쁜 지표(어그로도)에 맞게 축을 뒤집습니다.
  function scoreToColor(score, invert) {
    const clamped = Math.max(0, Math.min(100, Number(score) || 0));
    const goodness = invert ? 100 - clamped : clamped;
    const hue = (goodness / 100) * 120;
    return `hsl(${hue}, 72%, 45%)`;
  }

  function renderNotice(title, detail) {
    appEl.innerHTML = `
      <div class="notice">
        <strong>${escapeHtml(title)}</strong>
        <span>${escapeHtml(detail)}</span>
      </div>
    `;
  }

  function renderSkeleton() {
    const items = Array.from({ length: 4 }, () => `<div class="skeleton"></div>`).join("");
    appEl.innerHTML = `<p class="status-line">불러오는 중...</p><div class="article-grid">${items}</div>`;
  }

  function stanceSummary(articles) {
    const counts = new Map();
    articles.forEach(({ analysis }) => {
      const stance = analysis.direction?.stance;
      if (!stance) return;
      counts.set(stance, (counts.get(stance) || 0) + 1);
    });
    if (!counts.size) return "";

    const chips = STANCE_ORDER.filter((stance) => counts.has(stance)).map((stance) => {
      const color = STANCE_COLORS[stance] || STANCE_COLORS["중립적"];
      return `<span class="stance-chip" style="background:${color.bg};color:${color.fg}">${escapeHtml(stance)} ${counts.get(stance)}</span>`;
    }).join("");

    return `<div class="stance-summary">${chips}</div>`;
  }

  function createArticleCard(article, analysis) {
    const stance = analysis.direction?.stance;
    const stanceColor = STANCE_COLORS[stance] || STANCE_COLORS["중립적"];
    const stanceBadge = stance
      ? `<span class="stance-badge" style="background:${stanceColor.bg};color:${stanceColor.fg}">${escapeHtml(stance)}</span>`
      : "";
    const reason = analysis.direction?.reason
      ? `<details class="reason"><summary>이 관점으로 본 이유</summary><p>${escapeHtml(analysis.direction.reason)}</p></details>`
      : "";

    // 오른쪽 위 대각선 = 신뢰도, 왼쪽 아래 대각선 = 어그로도. 두 색이 다르면
    // 그 사이가 자연스럽게 그라데이션으로 이어집니다.
    const credibilityColor = scoreToColor(analysis.credibility_score, false);
    const clickbaitColor = scoreToColor(analysis.clickbait_score, true);
    const borderStyle = `background: linear-gradient(45deg, ${clickbaitColor}, ${credibilityColor});`;

    const wrapper = document.createElement("div");
    wrapper.className = "article-card-border";
    wrapper.style = borderStyle;
    wrapper.innerHTML = `
      <div class="article-card">
        <div class="thumb">
          ${analysis.image_url ? `<img src="${escapeHtml(analysis.image_url)}" alt="" loading="lazy">` : PLACEHOLDER_ICON}
        </div>
        <div class="body">
          <span class="article-source">${escapeHtml(domainOf(article.url))}</span>
          <p class="article-summary">${escapeHtml(analysis.article_summary || "")}</p>
          ${stanceBadge}
          ${reason}
          <a class="article-link" href="${escapeHtml(article.url)}" target="_blank" rel="noopener noreferrer">원문 보기 →</a>
        </div>
      </div>
    `;

    const thumbImg = wrapper.querySelector(".thumb img");
    if (thumbImg) {
      const thumbEl = wrapper.querySelector(".thumb");
      thumbImg.addEventListener("error", () => { thumbEl.innerHTML = PLACEHOLDER_ICON; });
    }

    return wrapper;
  }

  // ─────────────────────────────────────────────
  // 주제별 기사 로딩 — topics.articleUrls를 해시해 analysisResults에서 조회
  // ─────────────────────────────────────────────
  async function loadTopicArticles(topic) {
    const urls = Array.isArray(topic.articleUrls) ? topic.articleUrls : [];
    const docIds = await Promise.all(urls.map((url) => sha256Hex(url)));
    const articleDocs = await Promise.all(
      docIds.map((docId) => getDoc(doc(db, "analysisResults", docId)).catch(() => null))
    );

    const articles = [];
    articleDocs.forEach((docSnap, index) => {
      if (!docSnap || !docSnap.exists()) return; // 분석 기록이 없으면 조용히 건너뜁니다.
      const analysis = docSnap.data();
      if (!analysis.is_article) return;
      articles.push({ article: { url: urls[index] }, analysis });
    });
    return articles;
  }

  function renderTopicSection(topic, articles) {
    const sectionEl = document.createElement("section");
    sectionEl.className = "topic-section";

    if (!articles.length) {
      sectionEl.innerHTML = `
        <div class="topic-header">
          <h2>${escapeHtml(topic.topic || "제목 없음")}</h2>
          <span class="topic-meta">${escapeHtml(timeAgo(topic.updatedAt))} 업데이트</span>
        </div>
        <p class="status-line">이 이슈에 연결된 기사의 분석 기록을 찾지 못했습니다.</p>
      `;
      return sectionEl;
    }

    sectionEl.innerHTML = `
      <div class="topic-header">
        <h2>${escapeHtml(topic.topic || "제목 없음")}</h2>
        <span class="topic-meta">${articles.length}개 매체 보도 · ${escapeHtml(timeAgo(topic.updatedAt))} 업데이트</span>
      </div>
      ${stanceSummary(articles)}
    `;

    const gridEl = document.createElement("div");
    gridEl.className = "article-grid";
    articles.forEach(({ article, analysis }) => {
      gridEl.appendChild(createArticleCard(article, analysis));
    });
    sectionEl.appendChild(gridEl);

    return sectionEl;
  }

  async function renderFeed(topics) {
    if (!topics.length) {
      appEl.innerHTML = "";
      renderNotice("표시할 이슈가 없습니다", "아직 분석된 기사가 쌓이지 않았습니다.");
      return;
    }

    appEl.innerHTML = `
      <p class="status-line">최근 이슈 ${topics.length}건</p>
      <div class="legend"><span class="swatch"></span>기사 테두리 색: 오른쪽 위 = 신뢰도, 왼쪽 아래 = 어그로도 (빨강 낮음 · 초록 높음)</div>
      <div id="feedList"></div>
    `;
    const feedListEl = document.getElementById("feedList");

    const sections = await Promise.all(
      topics.map(async (topic) => {
        const articles = await loadTopicArticles(topic);
        return { topic, articles };
      })
    );

    feedListEl.innerHTML = "";
    sections.forEach(({ topic, articles }) => {
      feedListEl.appendChild(renderTopicSection(topic, articles));
    });
  }

  const topicsQuery = query(collection(db, "topics"), orderBy("updatedAt", "desc"), limit(30));
  renderSkeleton();
  onSnapshot(
    topicsQuery,
    (snapshot) => {
      const topics = snapshot.docs.map((docSnap) => ({ id: docSnap.id, ...docSnap.data() }));
      renderFeed(topics);
    },
    () => {
      renderNotice("이슈 목록을 불러오지 못했습니다", "잠시 후 다시 시도해주세요.");
    }
  );
</script>

</body>
</html>
