<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>intone news</title>
<style>
  :root {
    --bg: #f7f8fa;
    --card: #ffffff;
    --text: #0f172a;
    --muted: #64748b;
    --border: #e5e7eb;
    --accent-a: #3b82f6;
    --accent-b: #4338ca;
    --shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0b0f19;
      --card: #131826;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --border: #232a3a;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Pretendard, "Noto Sans KR", sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  /* ---------- Header ---------- */
  header {
    position: sticky;
    top: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 16px 28px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(8px);
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 0 0 auto;
  }

  .brand svg { display: block; }

  .brand .wordmark {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.03em;
    color: var(--text);
  }

  .brand .wordmark b {
    font-weight: 800;
  }

  .search-form {
    flex: 1 1 auto;
    max-width: 420px;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    border: 1px solid var(--border);
    border-radius: 999px;
    background: var(--card);
  }

  .search-form input {
    flex: 1;
    border: 0;
    outline: none;
    background: transparent;
    color: var(--text);
    font-size: 14px;
  }

  .search-form button {
    border: 0;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    display: flex;
    align-items: center;
  }

  /* ---------- Category tabs ---------- */
  .tabs {
    display: flex;
    gap: 8px;
    padding: 14px 28px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }

  .tab {
    flex: 0 0 auto;
    padding: 8px 16px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--muted);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    transition: transform 120ms ease, background 150ms ease, color 150ms ease;
  }

  .tab:hover { transform: translateY(-1px); }

  .tab.active {
    color: #ffffff;
    background: linear-gradient(135deg, var(--accent-a), var(--accent-b));
    border-color: transparent;
  }

  /* ---------- Main grid ---------- */
  main {
    padding: 8px 28px 60px;
    max-width: 1180px;
    margin: 0 auto;
  }

  .status-line {
    padding: 6px 4px 18px;
    color: var(--muted);
    font-size: 13px;
    font-weight: 600;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 18px;
  }

  .card {
    display: flex;
    flex-direction: column;
    border-radius: 18px;
    background: var(--card);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    overflow: hidden;
    text-decoration: none;
    color: inherit;
    transition: transform 180ms ease, box-shadow 180ms ease;
  }

  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 16px 36px rgba(15, 23, 42, 0.12);
  }

  .card .thumb {
    width: 100%;
    aspect-ratio: 16 / 9;
    background: linear-gradient(135deg, rgba(59,130,246,0.16), rgba(67,56,202,0.16));
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .card .thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .card .thumb svg { opacity: 0.35; }

  .card .body {
    padding: 14px 16px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex: 1;
  }

  .card .source-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 11px;
    font-weight: 800;
    color: var(--accent-b);
    text-transform: uppercase;
    letter-spacing: 0.02em;
  }

  .card .source-row time { color: var(--muted); font-weight: 600; text-transform: none; }

  .card h3 {
    margin: 0;
    font-size: 15px;
    line-height: 1.4;
    font-weight: 750;
    letter-spacing: -0.01em;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card p {
    margin: 0;
    font-size: 13px;
    line-height: 1.55;
    color: var(--muted);
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    flex: 1;
  }

  .card .read-more {
    margin-top: 4px;
    font-size: 12.5px;
    font-weight: 800;
    color: var(--text);
  }

  /* ---------- Skeletons ---------- */
  .skeleton .thumb, .skeleton .line {
    background: linear-gradient(90deg, var(--border) 25%, rgba(255,255,255,0.35) 37%, var(--border) 63%);
    background-size: 400% 100%;
    animation: shimmer 1.4s ease infinite;
  }
  .skeleton .line { height: 12px; border-radius: 6px; margin: 4px 0; }
  .skeleton .line.w60 { width: 60%; }
  .skeleton .line.w90 { width: 90%; }
  .skeleton .line.w40 { width: 40%; }

  @keyframes shimmer {
    0% { background-position: 100% 0; }
    100% { background-position: -100% 0; }
  }

  /* ---------- Empty / error ---------- */
  .notice {
    grid-column: 1 / -1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    padding: 60px 20px;
    text-align: center;
    color: var(--muted);
  }

  .notice strong { color: var(--text); font-size: 16px; }

  .notice code {
    padding: 2px 8px;
    border-radius: 6px;
    background: var(--border);
    font-size: 12px;
  }

  /* ---------- Topic groups ---------- */
  .group {
    grid-column: 1 / -1;
    border-radius: 18px;
    border: 1px solid var(--border);
    background: var(--card);
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .group-header {
    display: flex;
    align-items: baseline;
    gap: 10px;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }

  .group-header h2 {
    margin: 0;
    font-size: 16px;
    font-weight: 800;
    letter-spacing: -0.01em;
  }

  .group-header span {
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
  }

  .group-members {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 14px;
    padding: 16px 20px 20px;
  }

  .badge-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .badge {
    font-size: 11px;
    font-weight: 800;
    padding: 3px 8px;
    border-radius: 999px;
    white-space: nowrap;
  }

  .badge-credibility { background: rgba(59,130,246,0.14); color: var(--accent-b); }
  .badge-clickbait { background: rgba(239,68,68,0.14); color: #dc2626; }
  .badge-stance { background: rgba(100,116,139,0.14); color: var(--muted); }
</style>
</head>
<body>

<header>
  <div class="brand">
    <svg width="30" height="30" viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="12.5" cy="12.5" r="8.5" stroke="currentColor" stroke-width="3"/>
      <path d="M18.5 18.5L25 25" stroke="currentColor" stroke-width="3.4" stroke-linecap="round"/>
    </svg>
    <span class="wordmark"><b>intone</b> news</span>
  </div>

  <form class="search-form" id="searchForm">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/>
      <path d="M20 20L16.65 16.65" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </svg>
    <input id="searchInput" type="text" placeholder="키워드로 검색 (예: 반도체, 선거, AI...)" autocomplete="off">
  </form>
</header>

<nav class="tabs" id="tabs"></nav>

<main>
  <p class="status-line" id="statusLine">불러오는 중...</p>
  <div class="grid" id="grid"></div>
</main>

<script>
(function () {
  // ─────────────────────────────────────────────
  // 설정
  // ─────────────────────────────────────────────
  const NEWS_API_KEY = "__NEWS_API_KEY__";
  const NEWS_API_BASE = "https://gnews.io/api/v4";
  const NEWS_LANG = "ko";
  const NEWS_COUNTRY = "kr";

  // Intone 확장 프로그램이 신뢰도/어그로도 분석을 쌓아두는 공유 Firestore.
  // Web API Key는 클라이언트 공개용이며, 접근 제어는 Firestore 보안 규칙이 담당합니다.
  const FIRESTORE_PROJECT_ID = "intone-analysis";
  const FIRESTORE_API_KEY = "AIzaSyBQT-UNNgB5Ujlkw_RFsPNsfKfj0jIXQnY";
  const FIRESTORE_COLLECTION = "analysisResults";
  const GROUP_OVERLAP_RATIO = 0.5;

  const CATEGORIES = [
    { id: "general", label: "전체" },
    { id: "business", label: "비즈니스" },
    { id: "technology", label: "기술" },
    { id: "entertainment", label: "연예" },
    { id: "health", label: "건강" },
    { id: "science", label: "과학" },
    { id: "sports", label: "스포츠" }
  ];

  const tabsEl = document.getElementById("tabs");
  const gridEl = document.getElementById("grid");
  const statusEl = document.getElementById("statusLine");
  const searchForm = document.getElementById("searchForm");
  const searchInput = document.getElementById("searchInput");

  let activeCategory = "general";
  let activeQuery = "";
  let requestToken = 0;

  // ─────────────────────────────────────────────
  // 탭 렌더링
  // ─────────────────────────────────────────────
  function renderTabs() {
    tabsEl.innerHTML = "";
    CATEGORIES.forEach((cat) => {
      const btn = document.createElement("button");
      btn.className = "tab" + (cat.id === activeCategory && !activeQuery ? " active" : "");
      btn.textContent = cat.label;
      btn.addEventListener("click", () => {
        activeCategory = cat.id;
        activeQuery = "";
        searchInput.value = "";
        renderTabs();
        loadNews();
      });
      tabsEl.appendChild(btn);
    });
  }

  searchForm.addEventListener("submit", (event) => {
    event.preventDefault();
    activeQuery = searchInput.value.trim();
    renderTabs();
    loadNews();
  });

  // ─────────────────────────────────────────────
  // 스켈레톤 / 안내 화면
  // ─────────────────────────────────────────────
  function renderSkeleton(count = 8) {
    gridEl.innerHTML = "";
    for (let i = 0; i < count; i += 1) {
      const card = document.createElement("div");
      card.className = "card skeleton";
      card.innerHTML = `
        <div class="thumb"></div>
        <div class="body">
          <div class="line w40"></div>
          <div class="line w90"></div>
          <div class="line w60"></div>
        </div>
      `;
      gridEl.appendChild(card);
    }
  }

  function renderNotice(title, detail) {
    gridEl.innerHTML = `
      <div class="notice">
        <strong>${escapeHtml(title)}</strong>
        <span>${detail}</span>
      </div>
    `;
  }

  // ─────────────────────────────────────────────
  // 기사 카드 렌더링
  // ─────────────────────────────────────────────
  const PLACEHOLDER_ICON = `
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="3" y="4" width="18" height="16" rx="2" stroke="currentColor" stroke-width="1.6"/>
      <path d="M7 9H17M7 13H14M7 17H11" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
    </svg>
  `;

  function timeAgo(iso) {
    if (!iso) return "";
    const diffMs = Date.now() - new Date(iso).getTime();
    const mins = Math.floor(diffMs / 60000);
    if (mins < 1) return "방금 전";
    if (mins < 60) return `${mins}분 전`;
    const hours = Math.floor(mins / 60);
    if (hours < 24) return `${hours}시간 전`;
    const days = Math.floor(hours / 24);
    return `${days}일 전`;
  }

  function escapeHtml(value) {
    return String(value ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  // ─────────────────────────────────────────────
  // Firestore(analysisResults) 조회 — Intone 확장이 쌓아둔 신뢰도/키워드 분석
  // ─────────────────────────────────────────────
  async function sha256Hex(text) {
    const digest = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(text));
    return Array.from(new Uint8Array(digest))
      .map((byte) => byte.toString(16).padStart(2, "0"))
      .join("");
  }

  function stripUrlFragment(url) {
    try {
      const parsed = new URL(url);
      parsed.hash = "";
      return parsed.toString();
    } catch (error) {
      return url;
    }
  }

  function decodeFirestoreValue(value) {
    if (!value || typeof value !== "object") return null;
    if ("stringValue" in value) return value.stringValue;
    if ("integerValue" in value) return Number(value.integerValue);
    if ("doubleValue" in value) return Number(value.doubleValue);
    if ("booleanValue" in value) return Boolean(value.booleanValue);
    if ("nullValue" in value) return null;
    if ("mapValue" in value) return firestoreFieldsToObject(value.mapValue?.fields);
    if ("arrayValue" in value) return (value.arrayValue?.values || []).map(decodeFirestoreValue);
    return null;
  }

  function firestoreFieldsToObject(fields) {
    const obj = {};
    for (const [key, value] of Object.entries(fields || {})) {
      obj[key] = decodeFirestoreValue(value);
    }
    return obj;
  }

  // 기사 URL 배열을 받아 { url: analysisRecord } 형태의 Map을 돌려줍니다.
  // 분석 기록이 없는 URL은 결과에서 빠집니다(신뢰도 뱃지/그룹핑 대상에서 제외).
  async function fetchAnalysisMap(urls) {
    const map = new Map();
    if (!urls.length) return map;

    const docIds = await Promise.all(urls.map((url) => sha256Hex(stripUrlFragment(url))));
    const endpoint = `https://firestore.googleapis.com/v1/projects/${FIRESTORE_PROJECT_ID}/databases/(default)/documents:batchGet?key=${FIRESTORE_API_KEY}`;

    try {
      const response = await fetch(endpoint, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          documents: docIds.map(
            (docId) => `projects/${FIRESTORE_PROJECT_ID}/databases/(default)/documents/${FIRESTORE_COLLECTION}/${docId}`
          )
        })
      });
      if (!response.ok) return map;

      const results = await response.json();
      results.forEach((result, index) => {
        if (!result.found) return;
        const record = firestoreFieldsToObject(result.found.fields);
        if (record && Array.isArray(record.core_keywords) && record.core_keywords.length) {
          map.set(urls[index], record);
        }
      });
    } catch (error) {
      // Firebase 조회 실패는 조용히 무시 — 뉴스 목록 자체는 계속 보여줘야 합니다.
    }

    return map;
  }

  // core_keywords 겹침이 50% 이상인 기존 그룹이 있으면 합류시키고,
  // 없으면 새 그룹을 만듭니다 (그룹 키워드는 합류할 때마다 합집합으로 확장).
  function clusterByKeywords(analyzedArticles) {
    const groups = [];

    analyzedArticles.forEach(({ article, analysis }) => {
      const keywords = analysis.core_keywords;
      let bestGroup = null;
      let bestOverlap = 0;

      groups.forEach((group) => {
        const overlap = keywords.filter((keyword) => group.keywordSet.has(keyword)).length;
        const ratio = overlap / keywords.length;
        if (ratio >= GROUP_OVERLAP_RATIO && overlap > bestOverlap) {
          bestGroup = group;
          bestOverlap = overlap;
        }
      });

      if (bestGroup) {
        keywords.forEach((keyword) => bestGroup.keywordSet.add(keyword));
        bestGroup.items.push({ article, analysis });
      } else {
        groups.push({
          topic: analysis.topic || article.title,
          keywordSet: new Set(keywords),
          items: [{ article, analysis }]
        });
      }
    });

    return groups;
  }

  function analysisBadges(analysis) {
    if (!analysis) return "";
    const stance = analysis.direction?.stance;
    return `
      <div class="badge-row">
        <span class="badge badge-credibility">신뢰도 ${analysis.credibility_score}</span>
        <span class="badge badge-clickbait">어그로도 ${analysis.clickbait_score}</span>
        ${stance ? `<span class="badge badge-stance">${escapeHtml(stance)}</span>` : ""}
      </div>
    `;
  }

  function createArticleCard(article, analysis) {
    const a = document.createElement("a");
    a.className = "card";
    a.href = article.url || "#";
    a.target = "_blank";
    a.rel = "noopener noreferrer";

    const thumbInner = article.image
      ? `<img src="${escapeHtml(article.image)}" alt="" loading="lazy" onerror="this.parentElement.innerHTML = '${PLACEHOLDER_ICON.replace(/'/g, "\\'")}';">`
      : PLACEHOLDER_ICON;

    a.innerHTML = `
      <div class="thumb">${thumbInner}</div>
      <div class="body">
        <div class="source-row">
          <span>${escapeHtml(article.source?.name || "출처 미상")}</span>
          <time>${timeAgo(article.publishedAt)}</time>
        </div>
        <h3>${escapeHtml(article.title || "제목 없음")}</h3>
        <p>${escapeHtml(article.description || "")}</p>
        ${analysisBadges(analysis)}
        <span class="read-more">기사 보기 →</span>
      </div>
    `;
    return a;
  }

  function renderArticles(articles, analysisMap) {
    gridEl.innerHTML = "";

    if (!articles.length) {
      renderNotice("표시할 기사가 없습니다", "다른 키워드나 카테고리를 시도해보세요.");
      return;
    }

    const analyzed = [];
    const singles = [];
    articles.forEach((article) => {
      const analysis = analysisMap.get(article.url);
      if (analysis) {
        analyzed.push({ article, analysis });
      } else {
        singles.push(article);
      }
    });

    const groups = clusterByKeywords(analyzed);

    groups.forEach((group) => {
      if (group.items.length < 2) {
        singles.push(group.items[0].article);
        return;
      }

      const groupEl = document.createElement("div");
      groupEl.className = "group";
      groupEl.innerHTML = `
        <div class="group-header">
          <h2>${escapeHtml(group.topic)}</h2>
          <span>${group.items.length}개 매체 보도</span>
        </div>
        <div class="group-members"></div>
      `;
      const membersEl = groupEl.querySelector(".group-members");
      group.items.forEach(({ article, analysis }) => {
        membersEl.appendChild(createArticleCard(article, analysis));
      });
      gridEl.appendChild(groupEl);
    });

    singles.forEach((article) => {
      gridEl.appendChild(createArticleCard(article, analysisMap.get(article.url)));
    });
  }

  // ─────────────────────────────────────────────
  // API 호출
  // ─────────────────────────────────────────────
  async function loadNews() {
    const myToken = ++requestToken;
    renderSkeleton();
    statusEl.textContent = "불러오는 중...";

    const url = activeQuery
      ? `${NEWS_API_BASE}/search?q=${encodeURIComponent(activeQuery)}&lang=${NEWS_LANG}&country=${NEWS_COUNTRY}&sortby=publishedAt&max=10&apikey=${NEWS_API_KEY}`
      : `${NEWS_API_BASE}/top-headlines?category=${activeCategory}&lang=${NEWS_LANG}&country=${NEWS_COUNTRY}&max=10&apikey=${NEWS_API_KEY}`;

    try {
      const response = await fetch(url);
      const data = await response.json();

      if (myToken !== requestToken) return; // 이후 요청이 이미 시작된 경우 무시

      if (!response.ok || data.errors) {
        statusEl.textContent = "";
        renderNotice(
          "뉴스를 불러오지 못했습니다",
          `${escapeHtml((data.errors && data.errors[0]) || "알 수 없는 오류")}`
        );
        return;
      }

      const articles = (data.articles || []).filter((item) => item.title);
      statusEl.textContent = activeQuery
        ? `"${activeQuery}" 검색 결과 ${articles.length}건`
        : `${CATEGORIES.find((c) => c.id === activeCategory)?.label || ""} 뉴스 ${articles.length}건`;

      const analysisMap = await fetchAnalysisMap(articles.map((item) => item.url).filter(Boolean));
      if (myToken !== requestToken) return;
      renderArticles(articles, analysisMap);
    } catch (error) {
      if (myToken !== requestToken) return;
      statusEl.textContent = "";
      renderNotice(
        "네트워크 오류가 발생했습니다",
        "이 페이지를 <code>file://</code>로 직접 열었다면, 로컬 서버(예: <code>npx serve</code>)로 실행해보세요."
      );
    }
  }

  renderTabs();
  loadNews();
})();
</script>

</body>
</html>
