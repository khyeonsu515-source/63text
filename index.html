<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>intone news</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f7f9;
    --bg-translucent: rgba(247, 247, 249, 0.78);
    --card: #ffffff;
    --text: #14151a;
    --muted: #6b7280;
    --border: #e7e7ec;
    --accent: #6d5ef8;
    --accent-2: #ff6b4a;
    --accent-soft: rgba(109, 94, 248, 0.12);
    --shadow-sm: 0 1px 2px rgba(20, 21, 26, 0.05);
    --track: #eef0f4;
    --sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Pretendard, "Noto Sans KR", sans-serif;
    --ease: cubic-bezier(0.16, 1, 0.3, 1);
    --radius-lg: 20px;
    --focus-ring: 0 0 0 3px var(--accent-soft), 0 0 0 1.5px var(--accent);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0a0a0d;
      --bg-translucent: rgba(10, 10, 13, 0.78);
      --card: #17181f;
      --text: #f2f2f5;
      --muted: #969ab0;
      --border: #24252f;
      --accent: #8f84ff;
      --accent-2: #ff8464;
      --accent-soft: rgba(143, 132, 255, 0.16);
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
      --track: #1e1f28;
    }
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background:
      radial-gradient(640px circle at 6% -12%, var(--accent-soft), transparent 60%),
      radial-gradient(520px circle at 100% 0%, rgba(255, 107, 74, 0.08), transparent 55%),
      var(--bg);
    color: var(--text);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
  }

  :focus-visible {
    outline: none;
    box-shadow: var(--focus-ring);
    border-radius: 8px;
  }

  /* ---------- Header ---------- */
  header {
    position: sticky;
    top: 0;
    z-index: 20;
    padding: 16px 28px;
    background: var(--bg-translucent);
    backdrop-filter: blur(14px) saturate(160%);
    -webkit-backdrop-filter: blur(14px) saturate(160%);
    border-bottom: 1px solid var(--border);
  }

  .masthead {
    max-width: 1180px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 9px;
    text-decoration: none;
    color: inherit;
  }

  .brand .logo-dot {
    width: 11px;
    height: 11px;
    border-radius: 999px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    box-shadow: 0 0 14px var(--accent);
    flex: 0 0 auto;
  }

  .brand .wordmark {
    font-size: 19px;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  .brand .tagline {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    margin-left: 2px;
  }

  .edition-date {
    font-size: 12.5px;
    font-weight: 600;
    color: var(--muted);
  }

  /* ---------- Category tabs ---------- */
  .category-tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 16px 28px 4px;
    max-width: 1180px;
    margin: 0 auto;
  }

  .category-tabs:empty { display: none; }

  .category-tab {
    padding: 7px 16px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--muted);
    font-family: var(--sans);
    font-size: 12.5px;
    font-weight: 600;
    cursor: pointer;
    transition: color 200ms var(--ease), border-color 200ms var(--ease), background 200ms var(--ease);
  }

  .category-tab:hover { border-color: var(--accent); color: var(--text); }

  .category-tab.active {
    background: linear-gradient(135deg, var(--accent), #8f6bff);
    color: #fff;
    border-color: transparent;
    box-shadow: 0 6px 16px -6px var(--accent);
  }

  main {
    padding: 20px 28px 64px;
    max-width: 1180px;
    margin: 0 auto;
  }

  .status-line {
    padding: 4px 2px 16px;
    color: var(--muted);
    font-size: 13px;
    font-weight: 600;
  }

  .legend {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 16px;
    margin-bottom: 32px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 999px;
    box-shadow: var(--shadow-sm);
    font-size: 12.5px;
    color: var(--muted);
    font-weight: 500;
    width: fit-content;
    max-width: 100%;
  }

  .legend .swatch {
    width: 16px;
    height: 16px;
    border-radius: 6px;
    background: linear-gradient(135deg, #ef4444, #22c55e);
    flex: 0 0 auto;
  }

  /* ---------- Notices / skeletons ---------- */
  .notice {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    padding: 64px 20px;
    text-align: center;
    color: var(--muted);
    border: 1px dashed var(--border);
    border-radius: var(--radius-lg);
  }

  .notice strong { color: var(--text); font-size: 17px; font-weight: 800; }

  .skeleton {
    background: linear-gradient(90deg, var(--track) 25%, var(--border) 37%, var(--track) 63%);
    background-size: 400% 100%;
    animation: shimmer 1.4s ease infinite;
    height: 260px;
    border-radius: var(--radius-lg);
    border: 1px solid var(--border);
  }

  @keyframes shimmer {
    0% { background-position: 100% 0; }
    100% { background-position: -100% 0; }
  }

  /* ---------- Entrance animation ---------- */
  @keyframes riseIn {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ---------- Topic feed ---------- */
  .topic-section {
    margin-bottom: 48px;
    padding-top: 28px;
    border-top: 1px solid var(--border);
    animation: riseIn 520ms var(--ease) both;
  }

  .topic-section:first-child {
    border-top: none;
    padding-top: 0;
  }

  /* 키워드가 겹쳐 같은 묶음으로 판단된, 바로 앞 주제와 이어지는 두 번째 이후 항목.
     구분선 없이 간격만 좁혀서 시각적으로 더 가깝게(연관 있게) 보이도록 합니다. */
  .topic-section.clustered {
    border-top: none;
    padding-top: 0;
    margin-top: -24px;
    margin-bottom: 40px;
  }

  .related-tag {
    display: block;
    font-size: 11.5px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 2px;
  }

  .topic-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 18px;
  }

  .topic-title-block {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .topic-category {
    display: inline-flex;
    align-self: flex-start;
    padding: 3px 11px;
    border-radius: 999px;
    background: var(--accent-soft);
    color: var(--accent);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.02em;
  }

  .topic-header h2 {
    margin: 0;
    font-size: 27px;
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1.25;
  }

  .topic-header .topic-meta {
    font-size: 12.5px;
    font-weight: 500;
    color: var(--muted);
    white-space: nowrap;
    margin-top: 6px;
  }

  .topic-empty {
    color: var(--muted);
    font-size: 13px;
    font-weight: 500;
  }

  .stance-summary {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 20px;
  }

  .stance-chip {
    padding: 4px 12px;
    border-radius: 999px;
    font-size: 11.5px;
    font-weight: 700;
  }

  .article-grid {
    position: relative; /* 확장된 카드가 이 기준으로 절대 위치를 잡습니다 */
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 22px;
    align-items: stretch;
  }

  /* 그리드 자리를 그대로 예약해두는 투명 자리표시자 — 카드가 확장되며
     그리드 흐름에서 빠져나가도(position:absolute) 다른 카드가 그 자리를
     메우러 밀려오지 않도록 높이만 원래 카드와 똑같이 맞춥니다. */
  .article-card-placeholder {
    visibility: hidden;
  }

  /* Diagonal gradient "border": credibility color meets the top-right edge,
     clickbait color meets the bottom-left edge, blending across the middle.
     On hover the same two colors bloom into a soft dual-tone glow. Width는
     :hover가 아니라 JS가 붙이는 .is-expanded로만 바뀝니다 — 1.5초 이상
     머물렀을 때만 옆으로 넓어지고, 넓어질 때 그리드 흐름에서 빠져나와
     (position:absolute) 다른 카드를 밀어내지 않고 그 위를 덮습니다.
     (setupCardHoverExpand 참고) */
  .article-card-border {
    position: relative;
    z-index: 1;
    padding: 3px;
    border-radius: calc(var(--radius-lg) + 3px);
    transition: width 380ms var(--ease), transform 320ms var(--ease), box-shadow 320ms var(--ease);
    animation: riseIn 520ms var(--ease) both;
    /* 평상시에도 신뢰도/어그로도 색이 옅게 은은히 비치는 앰비언트 글로우 */
    box-shadow:
      -6px 8px 20px -14px var(--glow-a, transparent),
      6px -8px 20px -14px var(--glow-b, transparent);
  }

  /* 마우스 호버 또는 키보드 포커스 즉시(1.5초 기다리지 않고) 주는 가벼운 피드백.
     실제 폭 확장/세부 패널은 .is-expanded가 붙어야만 일어납니다. */
  .article-card-border:hover,
  .article-card-border:focus-within {
    transform: translateY(-6px);
    box-shadow:
      -14px 16px 38px -12px var(--glow-a, transparent),
      14px -14px 38px -12px var(--glow-b, transparent);
  }

  .article-card-border.is-expanded {
    z-index: 30;
    box-shadow:
      -20px 22px 48px -14px var(--glow-a, transparent),
      20px -20px 48px -14px var(--glow-b, transparent);
  }

  .article-card {
    display: flex;
    flex-direction: row;
    align-items: stretch;
    height: 100%;
    background: var(--card);
    border-radius: var(--radius-lg);
    overflow: hidden;
    box-shadow: var(--shadow-sm);
  }

  /* 기존 세로 카드(썸네일+본문)를 그대로 담는 왼쪽 칸. 확장 중에도 이 칸의
     폭은 절대 안 바뀝니다 — 오른쪽에 .article-card-side가 커지는 만큼
     바깥 .article-card-border 폭도 같이 늘어나서 이 칸 몫은 그대로 유지됩니다. */
  .article-card-main {
    flex: 1 1 auto;
    min-width: 0;
    display: flex;
    flex-direction: column;
    cursor: pointer;
  }

  /* 폭이 늘거나 줄어드는 동안(펼침 시작부터 접힘이 끝날 때까지) 내내 main을
     확장 시작 시점 폭으로 고정합니다(아래 .article-card-side가 flex:1로 나머지
     공간을 전부 흡수). is-expanded와 별도 클래스(is-sizing-locked)로 두는 이유:
     is-expanded는 접힐 때 바로 떼서 글로우/투명도가 곧장 자연스럽게 페이드
     되지만, 이 폭 고정만큼은 바깥 폭 transition이 완전히 끝날 때까지 계속
     붙어 있어야 합니다 — 중간에 풀리면 side가 먼저 폭 0으로 돌아가는 순간
     main이 flex:1로 남은 공간을 그대로 떠안아 잠깐 더 넓어지고, thumb의
     aspect-ratio 때문에 카드가 순간적으로 아래로도 늘어나 보이는 버그가
     펼칠 때든 접을 때든 똑같이 생기기 때문입니다. */
  .article-card-border.is-sizing-locked .article-card-main {
    flex: 0 0 var(--main-width, auto);
  }

  .article-card--nolink .article-card-main { cursor: default; }

  .article-card .thumb {
    width: 100%;
    aspect-ratio: 16 / 10;
    background: linear-gradient(135deg, var(--accent-soft), rgba(255, 107, 74, 0.1));
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    flex: 0 0 auto;
  }

  .article-card .thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 550ms var(--ease);
  }

  .article-card-border:hover .thumb img,
  .article-card-border:focus-within .thumb img {
    transform: scale(1.06);
  }

  .article-card .thumb svg { opacity: 0.4; color: var(--accent); }

  .article-card .body {
    padding: 18px 18px 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex: 1;
  }

  .article-topic-kicker {
    font-size: 11.5px;
    font-weight: 700;
    color: var(--accent);
  }

  .article-source {
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .article-headline {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: 1;
  }

  .article-title {
    margin: 0;
    font-size: 15.5px;
    font-weight: 700;
    line-height: 1.4;
    letter-spacing: -0.01em;
    color: var(--text);
  }

  .article-title a {
    color: inherit;
    text-decoration: none;
  }
  .article-title a:hover { text-decoration: underline; text-underline-offset: 2px; }

  .article-dek {
    margin: 0;
    font-size: 12.5px;
    font-weight: 500;
    line-height: 1.5;
    color: var(--muted);
  }

  .stance-badge {
    align-self: flex-start;
    padding: 4px 12px;
    border-radius: 999px;
    font-size: 11.5px;
    font-weight: 700;
  }

  /* 1.5초 이상 호버(또는 키보드 포커스)해서 .is-expanded가 붙어야만 이 오른쪽
     칸이 나타납니다 — 세로 높이가 아니라 가로 폭만 늘어나는 확장이라, 왼쪽
     본문(.article-card-main)의 크기는 전혀 안 바뀝니다. 폭은 별도 transition을
     주지 않고 flex:1로만 지정합니다 — 옆 main이 폭을 고정값으로 못박고 있으니,
     바깥 .article-card-border의 폭이 (JS가 미는) 하나의 transition으로 늘어나는
     매 프레임마다 남는 공간을 그대로, 어긋남 없이 받아 채우게 됩니다. */
  .article-card-side {
    flex: 0 0 auto;
    width: 0;
    min-width: 0;
    overflow: hidden;
    border-left: 0 solid var(--border);
    transition: border-left-width 380ms var(--ease);
  }

  .article-card-border.is-sizing-locked .article-card-side {
    flex: 1 1 auto;
    width: auto;
  }

  .article-card-border.is-expanded .article-card-side {
    border-left-width: 1px;
  }

  /* 표(세부 패널) 자체가 옆에서 슬며시 밀려 나오는 것처럼 보이도록, 폭이
     넓어지는 것과는 별개로 내용에 페이드+슬라이드 진입 애니메이션을 줍니다.
     .article-card-side의 폭은 바깥 카드 폭에 종속된 flex 결과라 자체
     transition이 없으므로(그게 있으면 두 애니메이션이 어긋나 버그가 남),
     "애니메이션이 보인다"는 느낌은 전적으로 이 진입 효과가 담당합니다. */
  .article-detail {
    width: 100%;
    /* 부모(article-card-side) 폭이 0이어도 내부 콘텐츠가 세로로 찌그러지지
       않도록 방어 — overflow:hidden인 부모가 잘라서 가려줄 뿐, 내용 자체는
       항상 제 폭을 유지합니다. */
    min-width: max-content;
    padding: 20px 20px 20px 18px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    opacity: 0;
    transform: translateX(-14px);
    transition: opacity 340ms var(--ease) 90ms, transform 340ms var(--ease) 90ms;
  }

  .article-card-border.is-expanded .article-detail {
    opacity: 1;
    transform: translateX(0);
  }

  .detail-col h4 {
    margin: 0 0 8px;
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .breakdown-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 7px;
  }

  .breakdown-label { flex: 0 0 96px; }

  .breakdown-track {
    flex: 1;
    height: 5px;
    border-radius: 999px;
    background: var(--track);
    overflow: hidden;
  }

  .breakdown-fill {
    height: 100%;
    width: 0;
    border-radius: 999px;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    transition: width 560ms var(--ease) 120ms;
  }

  .article-card-border.is-expanded .breakdown-fill {
    width: var(--target-width);
  }

  .breakdown-value {
    flex: 0 0 32px;
    text-align: right;
    color: var(--text);
    font-weight: 600;
  }

  details.reason {
    font-size: 12.5px;
    color: var(--muted);
    border-top: 1px solid var(--border);
    padding-top: 10px;
  }

  details.reason summary {
    cursor: pointer;
    font-weight: 600;
    color: var(--accent);
    list-style: none;
  }
  details.reason summary::-webkit-details-marker { display: none; }
  details.reason p { margin: 6px 0 0; line-height: 1.5; color: var(--text); }

  /* 모션에 민감한 사용자를 위해 애니메이션/전환을 비활성화합니다. */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.001ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.001ms !important;
    }
  }
</style>
</head>
<body>

<header>
  <div class="masthead">
    <a class="brand" href="/">
      <span class="logo-dot"></span>
      <span class="wordmark">Intone</span>
      <span class="tagline">Cross-checked news</span>
    </a>
    <span class="edition-date" id="editionDate"></span>
  </div>
</header>

<nav class="category-tabs" id="categoryTabs" aria-label="카테고리"></nav>

<main id="app">
  <p class="status-line">불러오는 중...</p>
</main>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
  import {
    getFirestore, collection, query, orderBy, limit, onSnapshot, doc, getDoc
  } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

  // ═══════════════════════════════════════════════════════════════
  // 설정
  // ═══════════════════════════════════════════════════════════════

  // Intone 확장 프로그램이 신뢰도/관점 분석을 쌓아두는 공유 Firestore.
  // 웹 API 키는 클라이언트 공개용이며, 접근 제어는 Firestore 보안 규칙(allow read: if true)이 담당합니다.
  const firebaseConfig = {
    apiKey: "AIzaSyBQT-UNNgB5Ujlkw_RFsPNsfKfj0jIXQnY",
    projectId: "intone-analysis"
  };

  const TOPIC_FETCH_LIMIT = 30;          // 한 번에 불러올 최근 주제 수

  // ═══════════════════════════════════════════════════════════════
  // 순수 유틸리티
  // ═══════════════════════════════════════════════════════════════

 function escapeHtml(value) {
    return String(value ?? "")
      // 1. 이미 정상적으로 인코딩된 HTML 엔티티(&#39;, &quot; 등)가 이중 변환되지 않도록 방어
      .replace(/&(?!#?[a-zA-Z0-9]+;)/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      // 2. 작은따옴표(어퍼스트로피) 치환 추가
      .replace(/'/g, "&#39;");

  // 공개 쓰기 가능한 Firestore에서 온 URL이므로, http/https만 신뢰합니다.
  // javascript:, data: 같은 위험한 스킴은 빈 문자열로 걸러 링크/이동에서 제외합니다.
  function safeHttpUrl(url) {
    try {
      const parsed = new URL(url);
      return (parsed.protocol === "http:" || parsed.protocol === "https:") ? parsed.href : "";
    } catch (error) {
      return "";
    }
  }

  function timeAgo(epochMs) {
    if (!epochMs) return "";
    const diffMs = Date.now() - epochMs;
    if (diffMs < 0) return "방금 전";
    const mins = Math.floor(diffMs / 60000);
    if (mins < 1) return "방금 전";
    if (mins < 60) return `${mins}분 전`;
    const hours = Math.floor(mins / 60);
    if (hours < 24) return `${hours}시간 전`;
    const days = Math.floor(hours / 24);
    return `${days}일 전`;
  }

  function domainOf(url) {
    try {
      return new URL(url).hostname.replace(/^www\./, "");
    } catch (error) {
      return "출처 미상";
    }
  }

  async function sha256Hex(text) {
    const digest = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(text));
    return Array.from(new Uint8Array(digest)).map((b) => b.toString(16).padStart(2, "0")).join("");
  }

  function staggerDelay(index, step) {
    return Math.min(index, MAX_STAGGER_STEPS) * step;
  }

  // ── 점수 → 색상 ────────────────────────────────────────────────
  // 0~100 점수를 빨강(나쁨)~주황~노랑~초록(좋음)의 다단계 색상으로 변환합니다.
  // hue만 회전시키면 중간 구간이 탁한 올리브색으로 뭉개져 대비가 약해지므로,
  // 뚜렷이 구분되는 색 정지점 사이를 RGB로 보간합니다 — 신호등처럼 한눈에 대비됩니다.
  const SCORE_COLOR_STOPS = [
    { at: 0,   rgb: [220, 38, 38] },   // 빨강 (나쁨)
    { at: 33,  rgb: [249, 115, 22] },  // 주황
    { at: 66,  rgb: [234, 179, 8] },   // 노랑
    { at: 100, rgb: [22, 197, 94] }    // 초록 (좋음)
  ];

  function lerp(a, b, t) {
    return a + (b - a) * t;
  }

  function scoreToRgb(goodness) {
    const clamped = Math.max(0, Math.min(100, goodness));
    for (let i = 0; i < SCORE_COLOR_STOPS.length - 1; i += 1) {
      const cur = SCORE_COLOR_STOPS[i];
      const next = SCORE_COLOR_STOPS[i + 1];
      if (clamped >= cur.at && clamped <= next.at) {
        const t = (clamped - cur.at) / (next.at - cur.at);
        return cur.rgb.map((channel, index) => Math.round(lerp(channel, next.rgb[index], t)));
      }
    }
    return SCORE_COLOR_STOPS[SCORE_COLOR_STOPS.length - 1].rgb;
  }

  // invert가 true면 점수가 높을수록 나쁜 지표(어그로도)에 맞게 축을 뒤집습니다.
  function scoreToRgbColor(score, invert) {
    const clamped = Math.max(0, Math.min(100, Number(score) || 0));
    const goodness = invert ? 100 - clamped : clamped;
    return scoreToRgb(goodness);
  }

  function rgbToCss([r, g, b], alpha) {
    return alpha === undefined ? `rgb(${r}, ${g}, ${b})` : `rgba(${r}, ${g}, ${b}, ${alpha})`;
  }

  function lightenRgb([r, g, b], amount) {
    return [r, g, b].map((c) => Math.round(c + (255 - c) * amount));
  }

  // ── Jaccard 유사도: 두 키워드 집합의 교집합 크기 / 합집합 크기 ──
  function keywordOverlapRatio(keywordsA, keywordsB) {
    const setA = new Set(Array.isArray(keywordsA) ? keywordsA : []);
    const setB = new Set(Array.isArray(keywordsB) ? keywordsB : []);
    if (!setA.size || !setB.size) return 0;
    let intersection = 0;
    setA.forEach((kw) => { if (setB.has(kw)) intersection += 1; });
    const union = new Set([...setA, ...setB]).size;
    return union === 0 ? 0 : intersection / union;
  }

  // ═══════════════════════════════════════════════════════════════

  function renderNotice(title, detail) {

  function renderBreakdownRows(breakdown, rows) {
    return rows.map(([key, label, max]) => {
      const raw = Number(breakdown?.[key]);

  // ═══════════════════════════════════════════════════════════════
  // 카드 호버 확장 — 1.5초 이상 머물면 옆으로만 넓어지고, 다른 카드를
  // 밀어내지 않고 그 위를 덮습니다(그리드 흐름에서 빠져나와 절대 위치로 전환).
  // 마우스가 나가면 즉시 원래 크기로 줄어들며 그리드 흐름으로 되돌아갑니다.
  // ═══════════════════════════════════════════════════════════════

  // 한 번에 하나만 펼쳐지도록, 지금 펼쳐진 카드를 접는 함수를 기억해둡니다.
  // 다른 카드가 펼쳐지거나 창 크기가 바뀌면 이걸 호출해서 즉시 접습니다.
  let collapseCurrentlyExpandedCard = null;

  window.addEventListener("resize", () => {
    // 확장 위치/폭은 호버를 시작한 시점의 레이아웃 기준으로 계산되므로,
    // 창 크기가 바뀌면 그 좌표가 더는 정확하지 않습니다 — 안전하게 접습니다.
    collapseCurrentlyExpandedCard?.();
  });

  function setupCardHoverExpand(wrapper) {
    let expandTimer = null;
    let expanded = false;
    let placeholder = null;

    function clearExpandTimer() {
      if (expandTimer) {
        window.clearTimeout(expandTimer);
        expandTimer = null;
      }
    }

    function collapse() {
      if (!expanded) return;
      expanded = false;
      if (collapseCurrentlyExpandedCard === collapse) {
        collapseCurrentlyExpandedCard = null;
      }
      // is-expanded는 바로 떼서 글로우/투명도가 곧장 자연스럽게 페이드되게
      // 둡니다. is-sizing-locked(main 폭 고정)는 아직 떼지 않습니다 — 지금
      // 떼면 side가 즉시 폭 0으로 돌아가면서 main이 flex:1로 남은 공간을
      // 순간 떠안아, 접을 때도 확장 때와 같은 "잠깐 아래로 늘어나는" 점프가
      // 생깁니다. 폭 transition이 완전히 끝나는 cleanup()에서 마저 뗍니다.
      wrapper.classList.remove("is-expanded");

      // 펼치는 동안 left도 0까지 움직였으므로, 접을 때는 폭뿐 아니라
      // left도 원래 자리(자리표시자 위치)로 함께 되돌립니다.
      const gridEl = wrapper.closest(".article-grid");
      const placeholderRect = placeholder ? placeholder.getBoundingClientRect() : null;
      if (placeholderRect && gridEl) {
        const gridRect = gridEl.getBoundingClientRect();
        wrapper.style.transition =
          `width ${CARD_COLLAPSE_ANIM_MS}ms var(--ease), ` +
          `left ${CARD_COLLAPSE_ANIM_MS}ms var(--ease), ` +
          `height ${CARD_COLLAPSE_ANIM_MS}ms var(--ease), ` +
          `transform 320ms var(--ease), box-shadow 320ms var(--ease)`;
        wrapper.style.width = `${placeholderRect.width}px`;
        wrapper.style.left = `${placeholderRect.left - gridRect.left}px`;
        wrapper.style.height = `${placeholderRect.height}px`;
      }

      const cleanup = () => {
        wrapper.classList.remove("is-sizing-locked");
        wrapper.style.position = "";
        wrapper.style.top = "";
        wrapper.style.left = "";
        wrapper.style.width = "";
        wrapper.style.height = "";
        wrapper.style.transition = "";
        wrapper.style.removeProperty("--main-width");
        placeholder?.remove();
        placeholder = null;
      };

      // transitionend를 우선 쓰되(정확한 타이밍), 브라우저가 이벤트를 못
      // 보내는 예외 상황(예: 요소가 도중에 DOM에서 제거됨) 대비 타이머로 이중 방어.
      let done = false;
      const finish = () => {
        if (done) return;
        done = true;
        wrapper.removeEventListener("transitionend", onTransitionEnd);
        cleanup();
      };
      const onTransitionEnd = (event) => {
        if (event.target === wrapper && event.propertyName === "width") finish();
      };
      wrapper.addEventListener("transitionend", onTransitionEnd);
      window.setTimeout(finish, CARD_COLLAPSE_ANIM_MS + 180);
    }

    function expand() {
      expandTimer = null;
      if (expanded || !wrapper.isConnected) return;

      const gridEl = wrapper.closest(".article-grid");
      if (!gridEl) return;

      // 다른 카드가 펼쳐져 있으면 먼저 접습니다 — 동시에 여러 개가
      // 펼쳐져 좌표 계산이 꼬이는 걸 막습니다.
      if (collapseCurrentlyExpandedCard && collapseCurrentlyExpandedCard !== collapse) {
        collapseCurrentlyExpandedCard();
      }

      const gridRect = gridEl.getBoundingClientRect();
      const rect = wrapper.getBoundingClientRect();
      const collapsedWidth = rect.width;
      const collapsedHeight = rect.height;
      const top = rect.top - gridRect.top;
      const originalLeft = rect.left - gridRect.left;
      const rowWidth = gridRect.width; // 그리드의 한 행은 항상 그리드 전체 폭을 씁니다.

      // 사진+기사 칸(article-card-main)은 확장 중에도 어차피 내용이 안 바뀌니,
      // 지금 이 순간의 폭을 그대로 고정값으로 못박아 둡니다 — 세부 패널이
      // flex:1로 나머지 공간을 흡수하는 동안 이 칸은 단 1px도 흔들리지 않습니다.
      const mainEl = wrapper.querySelector(".article-card-main");
      const mainWidth = mainEl ? mainEl.getBoundingClientRect().width : null;

      // 펼쳤을 때 다른 기사가 한 조각이라도 튀어나와 보이지 않도록, 펼쳐진
      // 카드는 항상 자기 줄(그리드 폭) 전체를 정확히 채웁니다. 채울 여유가
      // 너무 좁으면(모바일 1열 레이아웃 등) 어색하게 살짝만 펼쳐지는 대신
      // 아예 펼치지 않습니다.
      const panelWidth = rowWidth - collapsedWidth - CARD_EXPAND_GAP;
      if (panelWidth < CARD_EXPAND_MIN_PANEL_WIDTH) return;

      // 세로 길이도 마찬가지 이유로 같은 줄에서 제일 큰 카드에 맞춥니다 —
      // 안 그러면 확장된 카드의 세로 길이가 옆 카드보다 짧을 때 그 밑으로
      // 다른 기사의 아래쪽 끝이 살짝 삐져나와 보입니다. 같은 줄인지는
      // (자리표시자를 끼우기 전) 지금의 top 좌표가 거의 같은지로 판단합니다.
      const rowSiblings = Array.from(gridEl.querySelectorAll(".article-card-border")).filter((el) => {
        if (el === wrapper) return true;
        const elTop = el.getBoundingClientRect().top - gridRect.top;
        return Math.abs(elTop - top) <= 2;
      });
      const rowHeight = Math.max(collapsedHeight, ...rowSiblings.map((el) => el.getBoundingClientRect().height));

      // 그리드 자리를 그대로 예약해두는 자리표시자 — wrapper와 똑같은
      // 위치(다음 형제로)에 넣어서, wrapper가 absolute로 빠져도 다른
      // 카드가 밀려오지 않습니다.
      placeholder = document.createElement("div");
      placeholder.className = "article-card-placeholder";
      placeholder.style.height = `${collapsedHeight}px`;
      wrapper.before(placeholder);

      wrapper.style.position = "absolute";
      wrapper.style.top = `${top}px`;
      wrapper.style.left = `${originalLeft}px`;
      wrapper.style.width = `${collapsedWidth}px`;
      wrapper.style.height = `${collapsedHeight}px`;
      if (mainWidth) wrapper.style.setProperty("--main-width", `${mainWidth}px`);

      // Intone 팝업이 아래로 늘어나다가 화면 끝에 부딪히면 그때부터 반대
      // 방향(위)으로 늘어나는 것과 같은 방식: 먼저 오른쪽으로 늘어나 줄의
      // 오른쪽 끝에 닿을 때까지 자라고, 그 뒤로는 오른쪽 끝을 그대로 붙인 채
      // 왼쪽으로 계속 늘어나 결국 줄 왼쪽 끝(left:0)까지 닿습니다.
      // width는 처음부터 끝까지 하나의 선형(linear) 전환이고, left는 오른쪽
      // 여유(rightGap)를 다 쓴 시점부터 delay만큼 늦게 움직이기 시작하도록
      // 만들어서, 두 구간 내내 "오른쪽 끝 = 줄 오른쪽 경계"가 수학적으로
      // 정확히 맞물립니다(선형 구간에서 left+width의 변화율이 항상 상쇄되도록
      // 구간 길이를 rightGap : leftGap 비율로 나눴기 때문 — 다른 기사가
      // 한순간이라도 비집고 튀어나올 여지가 없습니다).
      const rightGap = rowWidth - (originalLeft + collapsedWidth);
      const leftGap = originalLeft;
      const totalGrowth = rightGap + leftGap; // = rowWidth - collapsedWidth, 항상 > 0(위 가드에서 보장)
      const phase1Ms = (CARD_EXPAND_ANIM_MS * rightGap) / totalGrowth;
      const phase2Ms = CARD_EXPAND_ANIM_MS - phase1Ms;

      // 폭/좌표를 먼저 "지금과 같은 값"으로 명시적으로 고정한 뒤, 다음
      // 프레임에 목표 값으로 바꿔야 transition이 실제로 애니메이션됩니다
      // (같은 프레임에 position: absolute와 목표 값을 한 번에 주면 전환
      // 없이 바로 점프해버림).
      requestAnimationFrame(() => {
        if (!expanded) return; // 그 사이 collapse()가 먼저 불렸으면 건너뜀
        wrapper.classList.add("is-expanded", "is-sizing-locked");
        wrapper.style.transition =
          `width ${CARD_EXPAND_ANIM_MS}ms linear, ` +
          `left ${phase2Ms}ms linear ${phase1Ms}ms, ` +
          `height ${CARD_EXPAND_ANIM_MS}ms var(--ease), ` +
          `transform 320ms var(--ease), box-shadow 320ms var(--ease)`;
        wrapper.style.width = `${rowWidth}px`;
        wrapper.style.left = "0px";
        wrapper.style.height = `${rowHeight}px`;
      });

      expanded = true;
      collapseCurrentlyExpandedCard = collapse;
    }

    // 마우스: 1.5초 이상 머물러야 펼쳐지고, 벗어나면 즉시 접힙니다.
    wrapper.addEventListener("mouseenter", () => {
      clearExpandTimer();
      if (!expanded) {
        expandTimer = window.setTimeout(expand, CARD_EXPAND_DELAY_MS);
      }
    });
    wrapper.addEventListener("mouseleave", () => {
      clearExpandTimer();
      collapse();
    });

    // 키보드 포커스: 마우스처럼 "잠깐 스쳐가는" 신호가 아니라 명확한 진입/이탈
    // 동작이라, 기다리지 않고 바로 펼치고/접습니다(Tab으로 훑을 때 1.5초씩
    // 기다리게 하면 키보드 사용자 경험이 오히려 나빠지므로).
    wrapper.addEventListener("focusin", () => {
      clearExpandTimer();
      if (!expanded) expand();
    });
    wrapper.addEventListener("focusout", (event) => {
      if (wrapper.contains(event.relatedTarget)) return; // 카드 내부에서 포커스 이동한 것뿐
      clearExpandTimer();
      collapse();
    });
  }

  // 이 주제에 달린 기사들의 관점(stance) 분포를 스펙트럼 순서대로 칩으로 보여줍니다.
  function stanceSummary(articles) {
    const counts = new Map();
    articles.forEach(({ analysis }) => {
      const stance = analysis.direction?.stance;
      if (stance) counts.set(stance, (counts.get(stance) || 0) + 1);
    });
    if (!counts.size) return "";

    // 알려진 스펙트럼 값을 순서대로, 그 외(구버전 값 등)는 뒤에 붙여 하나도 빠뜨리지 않습니다.
    const known = STANCE_ORDER.filter((stance) => counts.has(stance));
    const unknown = [...counts.keys()].filter((stance) => !STANCE_ORDER.includes(stance));
    const chips = [...known, ...unknown].map((stance) => {
      const color = STANCE_COLORS[stance] || STANCE_FALLBACK;
      return `<span class="stance-chip" style="background:${color.bg};color:${color.fg}">${escapeHtml(stance)} ${counts.get(stance)}</span>`;
    }).join("");

    return `<div class="stance-summary">${chips}</div>`;
  }

  function createArticleCard(article, analysis, delayMs, topicLabel) {
    const href = safeHttpUrl(article.url);

    const stance = analysis.direction?.stance;
    const stanceColor = STANCE_COLORS[stance] || STANCE_FALLBACK;
    const stanceBadge = stance
      ? `<span class="stance-badge" style="background:${stanceColor.bg};color:${stanceColor.fg}">${escapeHtml(stance)}</span>`
      : "";

    // 주제 섹션 헤더 없이 단독으로 표시되는 카드(기사 1개짜리 주제 모음)에서만
    // 어떤 이슈인지 알 수 있도록 작게 표시합니다.
    const topicKicker = topicLabel
      ? `<span class="article-topic-kicker">${escapeHtml(topicLabel)}</span>`
      : "";

    const reason = analysis.direction?.reason
      ? `<details class="reason"><summary>이 관점으로 본 이유</summary><p>${escapeHtml(analysis.direction.reason)}</p></details>`
      : "";

    // 카드를 1.5초 이상 호버/포커스하면 옆으로 펼쳐지며 나타나는 세부 분석
    // — Intone 팝업과 같은 항목/배점. 세로가 아니라 가로로 펼쳐지는 패널이라
    // 위아래로 쌓지 않고 신뢰도/어그로도를 한 칸에 순서대로 쌓습니다.
    const detailPanel = `
      <div class="article-detail">
        <div class="detail-col">
          <h4>신뢰도 세부</h4>
          ${renderBreakdownRows(analysis.credibility_breakdown, CREDIBILITY_ROWS)}
        </div>
        <div class="detail-col">
          <h4>어그로도 세부</h4>
          ${renderBreakdownRows(analysis.clickbait_breakdown, CLICKBAIT_ROWS)}
        </div>
      </div>
    `;

    // 실제 기사 제목을 메인 헤드라인으로, AI 한 줄 요약은 그 아래 보조 설명으로.
    // article_title이 없던 옛날 기사는 요약을 대신 헤드라인 자리에 보여줍니다.
    const hasTitle = Boolean(analysis.article_title);
    const headlineText = escapeHtml(hasTitle ? analysis.article_title : (analysis.article_summary || "제목 없음"));
    const headline = href
      ? `<a href="${escapeHtml(href)}" target="_blank" rel="noopener noreferrer">${headlineText}</a>`
      : headlineText;
    const dek = hasTitle && analysis.article_summary
      ? `<p class="article-dek">${escapeHtml(analysis.article_summary)}</p>`
      : "";

    // 오른쪽 위 대각선 = 신뢰도, 왼쪽 아래 대각선 = 어그로도. 신호등 색으로 또렷하게
    // 대비시키고, 같은 두 색을 옅게 밝혀 은은한 글로우(호버 시 진하게)도 만듭니다.
    const credibilityRgb = scoreToRgbColor(analysis.credibility_score, false);
    const clickbaitRgb = scoreToRgbColor(analysis.clickbait_score, true);

    const wrapper = document.createElement("div");
    wrapper.className = "article-card-border";
    wrapper.style.background = `linear-gradient(45deg, ${rgbToCss(clickbaitRgb)}, ${rgbToCss(credibilityRgb)})`;
    wrapper.style.setProperty("--glow-a", rgbToCss(lightenRgb(clickbaitRgb, 0.15), 0.55));
    wrapper.style.setProperty("--glow-b", rgbToCss(lightenRgb(credibilityRgb, 0.15), 0.55));
    wrapper.style.animationDelay = `${delayMs}ms`;
    wrapper.innerHTML = `
      <div class="article-card${href ? "" : " article-card--nolink"}">
        <div class="article-card-main">
          <div class="thumb">
            ${analysis.image_url ? `<img src="${escapeHtml(analysis.image_url)}" alt="" loading="lazy">` : PLACEHOLDER_ICON}
          </div>
          <div class="body">
            ${topicKicker}
            <span class="article-source">${escapeHtml(domainOf(article.url))}</span>
            <div class="article-headline">
              <h3 class="article-title">${headline}</h3>
              ${dek}
            </div>
            ${stanceBadge}
            ${reason}
          </div>
        </div>
        <div class="article-card-side">${detailPanel}</div>
      </div>
    `;

    const thumbEl = wrapper.querySelector(".thumb");
    const thumbImg = thumbEl.querySelector("img");
    if (thumbImg) {
      thumbImg.addEventListener("error", () => { thumbEl.innerHTML = PLACEHOLDER_ICON; });
    }

    // 본문(썸네일+제목) 어디를 클릭하든 기사로 이동(편의 기능). 세부 분석
    // 패널은 기사 자체가 아니라 참고 정보라 클릭 대상에서 제외합니다.
    // 단, (1) 링크/펼치기(details) 요소를 눌렀거나 (2) 텍스트를 드래그 선택
    // 중이거나 (3) 안전한 URL이 없으면 건너뜁니다.
    if (href) {
      const mainEl = wrapper.querySelector(".article-card-main");
      mainEl.addEventListener("click", (event) => {
        if (event.target.closest("a, details")) return;
        if (String(window.getSelection?.() || "").length > 0) return;
        window.open(href, "_blank", "noopener,noreferrer");
      });
    }

    setupCardHoverExpand(wrapper);

    return wrapper;
  }

  function buildArticleGrid(items) {
    const gridEl = document.createElement("div");
    gridEl.className = "article-grid";
    items.forEach(({ article, analysis, topicLabel }, index) => {
      gridEl.appendChild(createArticleCard(article, analysis, staggerDelay(index, CARD_STAGGER_MS), topicLabel));
    });
    return gridEl;
  }

  function topicHeaderHtml(topic, metaText, isClustered) {
    const relatedTag = isClustered ? `<span class="related-tag">관련 이슈</span>` : "";
    const categoryKicker = topic.category
      ? `<span class="topic-category">${escapeHtml(topic.category)}</span>`
      : "";
    return `
      <div class="topic-header">
        <div class="topic-title-block">
          ${relatedTag}
          ${categoryKicker}
          <h2>${escapeHtml(topic.topic || "제목 없음")}</h2>
        </div>
        <span class="topic-meta">${escapeHtml(metaText)}</span>
      </div>
    `;
  }

  function renderTopicSection(topic, articles, sectionDelayMs, isClustered) {
    const sectionEl = document.createElement("section");
    sectionEl.className = isClustered ? "topic-section clustered" : "topic-section";
    sectionEl.style.animationDelay = `${sectionDelayMs}ms`;

    if (!articles.length) {
      sectionEl.innerHTML =
        topicHeaderHtml(topic, `${timeAgo(topic.updatedAt)} 업데이트`, isClustered) +
        `<p class="topic-empty">이 이슈에 연결된 기사의 분석 기록을 찾지 못했습니다.</p>`;
      return sectionEl;
    }

    sectionEl.innerHTML =
      topicHeaderHtml(topic, `${articles.length}개 매체 보도 · ${timeAgo(topic.updatedAt)} 업데이트`, isClustered) +
      stanceSummary(articles);
    sectionEl.appendChild(buildArticleGrid(articles));
    return sectionEl;
  }

  // ═══════════════════════════════════════════════════════════════
  // 데이터 로딩
  // ═══════════════════════════════════════════════════════════════

  // 한 주제(topic)의 articleUrls를 해시해 analysisResults에서 분석 기록을 조회합니다.
  // 중복 URL은 한 번만, 기록이 없거나 기사가 아닌 문서는 조용히 건너뜁니다.
  async function loadTopicArticles(topic) {
    const urls = [...new Set((Array.isArray(topic.articleUrls) ? topic.articleUrls : []).filter(Boolean))];
    const docIds = await Promise.all(urls.map((url) => sha256Hex(url)));
    const articleDocs = await Promise.all(
      docIds.map((docId) => getDoc(doc(db, "analysisResults", docId)).catch(() => null))
    );

    const articles = [];
    articleDocs.forEach((docSnap, index) => {
      if (!docSnap || !docSnap.exists()) return;
      const analysis = docSnap.data();
      if (!analysis || !analysis.is_article) return;
      articles.push({ article: { url: urls[index] }, analysis });
    });
    return articles;
  }

  // ═══════════════════════════════════════════════════════════════
  // 연관 주제 클러스터링 (키워드 겹침 기반, 클라이언트에서만 계산)
  // ═══════════════════════════════════════════════════════════════

  // 서로 다른 topic이라도 core_keywords가 어느 정도 겹치면 연관 있다고 보고 Union-Find로
  // 묶습니다. 묶음 안은 최신순, 묶음끼리는 묶음의 최신 updatedAt 순으로 정렬한 뒤 평평한
  // 배열로 반환하며, 각 항목에 isClustered(묶음의 2번째 이후 항목인지)를 붙입니다.
  function clusterRelatedTopics(sections) {
    const parent = sections.map((_, i) => i);
    const find = (i) => {
      while (parent[i] !== i) {
        parent[i] = parent[parent[i]];
        i = parent[i];
      }
      return i;
    };
    const union = (a, b) => {
      const rootA = find(a);
      const rootB = find(b);
      if (rootA !== rootB) parent[rootA] = rootB;
    };

    for (let i = 0; i < sections.length; i += 1) {
      for (let j = i + 1; j < sections.length; j += 1) {
        if (keywordOverlapRatio(sections[i].topic.keywords, sections[j].topic.keywords) >= RELATED_OVERLAP_THRESHOLD) {
          union(i, j);
        }
      }
    }

    const clusters = new Map();
    sections.forEach((section, i) => {
      const root = find(i);
      if (!clusters.has(root)) clusters.set(root, []);
      clusters.get(root).push(section);
    });

    const clusterList = [...clusters.values()];
    clusterList.forEach((members) => members.sort((a, b) => (b.topic.updatedAt || 0) - (a.topic.updatedAt || 0)));
    clusterList.sort((a, b) => (b[0].topic.updatedAt || 0) - (a[0].topic.updatedAt || 0));

    const ordered = [];
    clusterList.forEach((members) => {
      members.forEach((section, index) => ordered.push({ ...section, isClustered: index > 0 }));
    });
    return ordered;
  }

  // ═══════════════════════════════════════════════════════════════
  // 피드 렌더링 + 상태
  // ═══════════════════════════════════════════════════════════════

  let currentSections = [];       // [{ topic, articles }]
  let activeCategory = "전체";
  let renderGeneration = 0;        // onSnapshot 재호출 시 오래된 async 렌더가 최신을 덮어쓰지 않게 하는 토큰
  let feedListEl = null;
  let feedStatusEl = null;

  function renderCategoryTabs() {
    const present = new Set(currentSections.map(({ topic }) => topic.category).filter(Boolean));
    if (!present.size) {
      categoryTabsEl.innerHTML = "";
      return;
    }

    const categories = ["전체", ...CATEGORY_ORDER.filter((c) => present.has(c))];
    categoryTabsEl.innerHTML = categories.map((category) => `
      <button class="category-tab${category === activeCategory ? " active" : ""}" type="button" data-category="${escapeHtml(category)}"${category === activeCategory ? ' aria-current="true"' : ""}>${escapeHtml(category)}</button>
    `).join("");

    categoryTabsEl.querySelectorAll(".category-tab").forEach((btn) => {
      btn.addEventListener("click", () => {
        if (btn.dataset.category === activeCategory) return;
        activeCategory = btn.dataset.category;
        renderCategoryTabs();
        renderFilteredFeed();
      });
    });
  }

  // 기사가 딱 1개뿐인 주제는 "비교"라는 취지에 안 맞고, 섹션 하나씩 차지하면 공간을
  // 낭비하므로, 제목 없이 한데 모아 카드 그리드로만(여러 줄로 흐르게) 표시합니다.
  function renderFilteredFeed() {
    if (!feedListEl) return;

    const filtered = activeCategory === "전체"
      ? currentSections
      : currentSections.filter(({ topic }) => topic.category === activeCategory);

    const headed = filtered.filter(({ articles }) => articles.length !== 1);
    const singles = filtered
      .filter(({ articles }) => articles.length === 1)
      .sort((a, b) => (b.topic.updatedAt || 0) - (a.topic.updatedAt || 0));

    const ordered = clusterRelatedTopics(headed);

    if (feedStatusEl) {
      feedStatusEl.textContent = activeCategory === "전체"
        ? `최근 이슈 ${filtered.length}건`
        : `${activeCategory} 이슈 ${filtered.length}건`;
    }

    const fragment = document.createDocumentFragment();
    ordered.forEach(({ topic, articles, isClustered }, index) => {
      fragment.appendChild(renderTopicSection(topic, articles, staggerDelay(index, SECTION_STAGGER_MS), isClustered));
    });

    if (singles.length) {
      const poolEl = document.createElement("section");
      poolEl.className = "topic-section";
      poolEl.style.animationDelay = `${staggerDelay(ordered.length, SECTION_STAGGER_MS)}ms`;
      poolEl.appendChild(buildArticleGrid(singles.map(({ topic, articles }) => ({
        article: articles[0].article,
        analysis: articles[0].analysis,
        topicLabel: topic.topic
      }))));
      fragment.appendChild(poolEl);
    }

    feedListEl.replaceChildren(fragment);
  }

  async function renderFeed(topics) {
    const gen = ++renderGeneration;

    if (!topics.length) {
      currentSections = [];
      feedListEl = null;
      feedStatusEl = null;
      categoryTabsEl.innerHTML = "";
      renderNotice("표시할 이슈가 없습니다", "아직 분석된 기사가 쌓이지 않았습니다.");
      return;
    }

    // 스캐폴드를 먼저 세워 로딩 흔적을 지웁니다.
    appEl.innerHTML = `
      <p class="status-line" id="feedStatus">최근 이슈 ${topics.length}건</p>
      <div class="legend"><span class="swatch"></span>기사 테두리 색: 오른쪽 위 = 신뢰도, 왼쪽 아래 = 어그로도 (빨강 낮음 · 초록 높음)</div>
      <div id="feedList"></div>
    `;
    feedStatusEl = document.getElementById("feedStatus");
    feedListEl = document.getElementById("feedList");

    const sections = await Promise.all(
      topics.map(async (topic) => ({ topic, articles: await loadTopicArticles(topic) }))
    );

    // 이 렌더가 진행되는 사이 더 새로운 스냅샷이 도착했으면 이 결과는 버립니다.
    if (gen !== renderGeneration) return;

    currentSections = sections;
    if (activeCategory !== "전체" && !CATEGORY_ORDER.includes(activeCategory)) {
      activeCategory = "전체";
    }

    renderCategoryTabs();
    renderFilteredFeed();
  }

  // ═══════════════════════════════════════════════════════════════
  // 부트스트랩 — topics를 최신순으로 실시간 구독
  // ═══════════════════════════════════════════════════════════════

  renderSkeleton();
  onSnapshot(
    query(collection(db, "topics"), orderBy("updatedAt", "desc"), limit(TOPIC_FETCH_LIMIT)),
    (snapshot) => {
      const topics = snapshot.docs.map((docSnap) => ({ id: docSnap.id, ...docSnap.data() }));
      renderFeed(topics).catch(() => {
        renderNotice("이슈를 표시하는 중 문제가 발생했습니다", "잠시 후 다시 시도해주세요.");
      });
    },
    () => {
      renderNotice("이슈 목록을 불러오지 못했습니다", "잠시 후 다시 시도해주세요.");
    }
  );
</script>

</body>
</html>
