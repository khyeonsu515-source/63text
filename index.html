<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>intone news</title>
<style>
  :root {
    --bg: #f7f8fa;
    --card: #ffffff;
    --text: #0f172a;
    --muted: #64748b;
    --border: #e5e7eb;
    --accent-a: #3b82f6;
    --accent-b: #4338ca;
    --shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
    --track: #eef0f4;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0b0f19;
      --card: #131826;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --border: #232a3a;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
      --track: #1c2333;
    }
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Pretendard, "Noto Sans KR", sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  header {
    position: sticky;
    top: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 28px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(8px);
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: inherit;
    cursor: pointer;
  }

  .brand svg { display: block; color: var(--accent-b); }

  .brand .wordmark {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.03em;
    color: var(--text);
  }

  main {
    padding: 20px 28px 60px;
    max-width: 1180px;
    margin: 0 auto;
  }

  .status-line {
    padding: 6px 4px 18px;
    color: var(--muted);
    font-size: 13px;
    font-weight: 600;
  }

  /* ---------- Topic list ---------- */
  .topic-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 18px;
  }

  .topic-card {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 20px;
    border-radius: 18px;
    background: var(--card);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    cursor: pointer;
    text-align: left;
    color: inherit;
    font: inherit;
    transition: transform 180ms ease, box-shadow 180ms ease;
  }

  .topic-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 16px 36px rgba(15, 23, 42, 0.12);
  }

  .topic-card h3 {
    margin: 0;
    font-size: 16px;
    line-height: 1.4;
    font-weight: 750;
    letter-spacing: -0.01em;
  }

  .topic-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12.5px;
    color: var(--muted);
    font-weight: 600;
  }

  .topic-meta .count {
    color: var(--accent-b);
    font-weight: 800;
  }

  /* ---------- Notices / skeletons ---------- */
  .notice {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    padding: 60px 20px;
    text-align: center;
    color: var(--muted);
  }

  .notice strong { color: var(--text); font-size: 16px; }

  .skeleton {
    background: linear-gradient(90deg, var(--border) 25%, rgba(255,255,255,0.35) 37%, var(--border) 63%);
    background-size: 400% 100%;
    animation: shimmer 1.4s ease infinite;
    border-radius: 18px;
    height: 92px;
  }

  @keyframes shimmer {
    0% { background-position: 100% 0; }
    100% { background-position: -100% 0; }
  }

  /* ---------- Topic detail ---------- */
  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: none;
    color: var(--muted);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    padding: 0;
    margin-bottom: 16px;
  }
  .back-link:hover { color: var(--text); }

  .topic-title {
    font-size: 24px;
    font-weight: 800;
    letter-spacing: -0.02em;
    margin: 0 0 4px;
  }

  .topic-sub {
    color: var(--muted);
    font-size: 13px;
    font-weight: 600;
    margin: 0 0 20px;
  }

  .stance-summary {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 16px 18px;
    border-radius: 16px;
    background: var(--card);
    border: 1px solid var(--border);
    margin-bottom: 22px;
  }

  .stance-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 12px;
    border-radius: 999px;
    font-size: 12.5px;
    font-weight: 800;
  }

  .article-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 18px;
  }

  .article-card {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 18px;
    border-radius: 18px;
    background: var(--card);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
  }

  .article-source {
    font-size: 11px;
    font-weight: 800;
    color: var(--accent-b);
    text-transform: uppercase;
    letter-spacing: 0.02em;
  }

  .article-summary {
    margin: 0;
    font-size: 13.5px;
    line-height: 1.55;
    color: var(--text);
  }

  .stance-badge {
    align-self: flex-start;
    padding: 4px 12px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 800;
  }

  .score-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11.5px;
    font-weight: 700;
    color: var(--muted);
  }

  .score-label { flex: 0 0 46px; }

  .score-track {
    flex: 1;
    height: 6px;
    border-radius: 999px;
    background: var(--track);
    overflow: hidden;
  }

  .score-fill { height: 100%; border-radius: 999px; }
  .score-fill.credibility { background: linear-gradient(90deg, var(--accent-a), var(--accent-b)); }
  .score-fill.clickbait { background: #ef4444; }

  .score-value { flex: 0 0 26px; text-align: right; color: var(--text); }

  details.reason {
    font-size: 12.5px;
    color: var(--muted);
  }

  details.reason summary {
    cursor: pointer;
    font-weight: 700;
    color: var(--accent-b);
    list-style: none;
  }
  details.reason summary::-webkit-details-marker { display: none; }
  details.reason p { margin: 6px 0 0; line-height: 1.5; color: var(--text); }

  .article-link {
    margin-top: 4px;
    align-self: flex-start;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12.5px;
    font-weight: 800;
    color: var(--text);
    text-decoration: none;
    padding: 7px 14px;
    border-radius: 999px;
    border: 1px solid var(--border);
  }
  .article-link:hover { border-color: var(--accent-b); color: var(--accent-b); }
</style>
</head>
<body>

<header>
  <a class="brand" id="brandLink" href="#/">
    <svg width="30" height="30" viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="12.5" cy="12.5" r="8.5" stroke="currentColor" stroke-width="3"/>
      <path d="M18.5 18.5L25 25" stroke="currentColor" stroke-width="3.4" stroke-linecap="round"/>
    </svg>
    <span class="wordmark"><b>intone</b> news</span>
  </a>
</header>

<main id="app">
  <p class="status-line">불러오는 중...</p>
</main>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
  import {
    getFirestore, collection, query, orderBy, limit, onSnapshot, doc, getDoc
  } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

  // Intone 확장 프로그램이 신뢰도/관점 분석을 쌓아두는 공유 Firestore.
  // 웹 API 키는 클라이언트 공개용이며, 접근 제어는 Firestore 보안 규칙(allow read: if true)이 담당합니다.
  const firebaseConfig = {
    apiKey: "AIzaSyBQT-UNNgB5Ujlkw_RFsPNsfKfj0jIXQnY",
    projectId: "intone-analysis"
  };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const appEl = document.getElementById("app");

  const STANCE_COLORS = {
    "비판적": { bg: "rgba(239,68,68,0.14)", fg: "#dc2626" },
    "옹호적": { bg: "rgba(59,130,246,0.14)", fg: "#2563eb" },
    "긍정적": { bg: "rgba(249,115,22,0.14)", fg: "#ea580c" },
    "부정적": { bg: "rgba(249,115,22,0.14)", fg: "#ea580c" },
    "중립적": { bg: "rgba(100,116,139,0.14)", fg: "#64748b" }
  };
  const STANCE_ORDER = ["비판적", "옹호적", "긍정적", "부정적", "중립적"];

  let unsubscribeTopics = null;

  function stopTopicListener() {
    if (unsubscribeTopics) {
      unsubscribeTopics();
      unsubscribeTopics = null;
    }
  }

  function escapeHtml(value) {
    return String(value ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function timeAgo(epochMs) {
    if (!epochMs) return "";
    const diffMs = Date.now() - epochMs;
    const mins = Math.floor(diffMs / 60000);
    if (mins < 1) return "방금 전";
    if (mins < 60) return `${mins}분 전`;
    const hours = Math.floor(mins / 60);
    if (hours < 24) return `${hours}시간 전`;
    const days = Math.floor(hours / 24);
    return `${days}일 전`;
  }

  function domainOf(url) {
    try {
      return new URL(url).hostname.replace(/^www\./, "");
    } catch (error) {
      return "출처 미상";
    }
  }

  async function sha256Hex(text) {
    const digest = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(text));
    return Array.from(new Uint8Array(digest)).map((b) => b.toString(16).padStart(2, "0")).join("");
  }

  function renderNotice(title, detail) {
    appEl.innerHTML = `
      <div class="notice">
        <strong>${escapeHtml(title)}</strong>
        <span>${escapeHtml(detail)}</span>
      </div>
    `;
  }

  function renderSkeleton(count = 6) {
    const items = Array.from({ length: count }, () => `<div class="skeleton"></div>`).join("");
    appEl.innerHTML = `<p class="status-line">불러오는 중...</p><div class="topic-grid">${items}</div>`;
  }

  // ─────────────────────────────────────────────
  // 주제 목록 화면
  // ─────────────────────────────────────────────
  function renderTopicList(topics) {
    if (!topics.length) {
      appEl.innerHTML = `<p class="status-line">최근 이슈 0건</p>`;
      renderNotice("표시할 이슈가 없습니다", "아직 분석된 기사가 쌓이지 않았습니다.");
      return;
    }

    const cards = topics.map((topic) => `
      <button class="topic-card" data-topic-id="${escapeHtml(topic.id)}">
        <h3>${escapeHtml(topic.topic || "제목 없음")}</h3>
        <div class="topic-meta">
          <span class="count">${(topic.articleUrls || []).length}개 매체 보도</span>
          <span>${escapeHtml(timeAgo(topic.updatedAt))}</span>
        </div>
      </button>
    `).join("");

    appEl.innerHTML = `
      <p class="status-line">최근 이슈 ${topics.length}건</p>
      <div class="topic-grid">${cards}</div>
    `;

    appEl.querySelectorAll(".topic-card").forEach((el) => {
      el.addEventListener("click", () => {
        location.hash = `#/topic/${encodeURIComponent(el.dataset.topicId)}`;
      });
    });
  }

  function loadTopicList() {
    stopTopicListener();
    renderSkeleton();

    const topicsQuery = query(collection(db, "topics"), orderBy("updatedAt", "desc"), limit(60));
    unsubscribeTopics = onSnapshot(
      topicsQuery,
      (snapshot) => {
        const topics = snapshot.docs.map((docSnap) => ({ id: docSnap.id, ...docSnap.data() }));
        renderTopicList(topics);
      },
      () => {
        renderNotice("이슈 목록을 불러오지 못했습니다", "잠시 후 다시 시도해주세요.");
      }
    );
  }

  // ─────────────────────────────────────────────
  // 주제 상세 화면
  // ─────────────────────────────────────────────
  function stanceSummary(articles) {
    const counts = new Map();
    articles.forEach(({ analysis }) => {
      const stance = analysis.direction?.stance;
      if (!stance) return;
      counts.set(stance, (counts.get(stance) || 0) + 1);
    });
    if (!counts.size) return "";

    const chips = STANCE_ORDER.filter((stance) => counts.has(stance)).map((stance) => {
      const color = STANCE_COLORS[stance] || STANCE_COLORS["중립적"];
      return `<span class="stance-chip" style="background:${color.bg};color:${color.fg}">${escapeHtml(stance)} ${counts.get(stance)}</span>`;
    }).join("");

    return `<div class="stance-summary">${chips}</div>`;
  }

  function scoreBar(label, value, kind) {
    const pct = Math.max(0, Math.min(100, Number(value) || 0));
    return `
      <div class="score-row">
        <span class="score-label">${label}</span>
        <div class="score-track"><div class="score-fill ${kind}" style="width:${pct}%"></div></div>
        <span class="score-value">${pct}</span>
      </div>
    `;
  }

  function createArticleCard(article, analysis) {
    const stance = analysis.direction?.stance;
    const color = STANCE_COLORS[stance] || STANCE_COLORS["중립적"];
    const stanceBadge = stance
      ? `<span class="stance-badge" style="background:${color.bg};color:${color.fg}">${escapeHtml(stance)}</span>`
      : "";
    const reason = analysis.direction?.reason
      ? `<details class="reason"><summary>이 관점으로 본 이유</summary><p>${escapeHtml(analysis.direction.reason)}</p></details>`
      : "";

    return `
      <div class="article-card">
        <span class="article-source">${escapeHtml(domainOf(article.url))}</span>
        <p class="article-summary">${escapeHtml(analysis.article_summary || "")}</p>
        ${stanceBadge}
        ${scoreBar("신뢰도", analysis.credibility_score, "credibility")}
        ${scoreBar("어그로도", analysis.clickbait_score, "clickbait")}
        ${reason}
        <a class="article-link" href="${escapeHtml(article.url)}" target="_blank" rel="noopener noreferrer">원문 보기 →</a>
      </div>
    `;
  }

  async function loadTopicDetail(topicId) {
    stopTopicListener();
    appEl.innerHTML = `<p class="status-line">불러오는 중...</p>`;

    let topicSnap;
    try {
      topicSnap = await getDoc(doc(db, "topics", topicId));
    } catch (error) {
      renderNotice("이슈를 불러오지 못했습니다", "잠시 후 다시 시도해주세요.");
      return;
    }

    if (!topicSnap.exists()) {
      renderNotice("이슈를 찾을 수 없습니다", "목록으로 돌아가 다른 이슈를 선택해주세요.");
      return;
    }

    const topic = topicSnap.data();
    const urls = Array.isArray(topic.articleUrls) ? topic.articleUrls : [];

    const docIds = await Promise.all(urls.map((url) => sha256Hex(url)));
    const articleDocs = await Promise.all(
      docIds.map((docId) =>
        getDoc(doc(db, "analysisResults", docId)).catch(() => null)
      )
    );

    const articles = [];
    articleDocs.forEach((docSnap, index) => {
      if (!docSnap || !docSnap.exists()) return; // 분석 기록이 없으면 조용히 건너뜁니다.
      const analysis = docSnap.data();
      if (!analysis.is_article) return;
      articles.push({ article: { url: urls[index] }, analysis });
    });

    const cards = articles.map(({ article, analysis }) => createArticleCard(article, analysis)).join("");

    appEl.innerHTML = `
      <button class="back-link" id="backLink">← 목록으로</button>
      <h1 class="topic-title">${escapeHtml(topic.topic || "제목 없음")}</h1>
      <p class="topic-sub">${articles.length}개 매체 보도 · ${escapeHtml(timeAgo(topic.updatedAt))} 업데이트</p>
      ${stanceSummary(articles)}
      ${articles.length ? `<div class="article-grid">${cards}</div>` : ""}
    `;

    if (!articles.length) {
      renderNotice("표시할 기사가 없습니다", "이 이슈에 연결된 기사의 분석 기록을 찾지 못했습니다.");
    }

    document.getElementById("backLink").addEventListener("click", () => {
      location.hash = "#/";
    });
  }

  // ─────────────────────────────────────────────
  // 라우팅
  // ─────────────────────────────────────────────
  function route() {
    const hash = location.hash || "#/";
    const match = hash.match(/^#\/topic\/(.+)$/);
    if (match) {
      loadTopicDetail(decodeURIComponent(match[1]));
    } else {
      loadTopicList();
    }
  }

  window.addEventListener("hashchange", route);
  route();
</script>

</body>
</html>
